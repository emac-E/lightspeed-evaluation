  description: RHEL 10 Benchmark Question 20
  tag: rhel10_benchmark
  turns:
  - turn_id: turn1
    query: How can I run multiple PostgreSQL 16 instances on a single RHEL 10 host?
    response: null
    contexts: null
    expected_response: On RHEL 10, you cannot install multiple PostgreSQL instances
      on the same host due to conflicting RPM packages, as only one version (stream)
      of the same module can be installed by design. As an alternative, you can run
      the database server services in a container.
