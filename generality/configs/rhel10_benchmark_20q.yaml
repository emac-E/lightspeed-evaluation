- conversation_group_id: rhel10_benchmark_q12
  description: RHEL 10 Benchmark Question 12
  tag: rhel10_benchmark
  turns:
  - turn_id: turn1
    query: Why does Red Hat make a specific recomendation about duplicate UIDs and
      GIDs?
    response: null
    contexts: null
    expected_response: Red Hat recommends you do not have multiple entries with the
      same UIDs or GIDs. This is because if you have objects with duplicate IDs, security
      identifiers (SIDs) are not generated correctly. SIDs are crucial for trusts
      between IdM and Active Directory and for Kerberos authentication to work correctly.
    turn_metrics: *id001
- conversation_group_id: rhel10_benchmark_q13
  description: RHEL 10 Benchmark Question 13
  tag: rhel10_benchmark
  turns:
  - turn_id: turn1
    query: As someone managing Red Hat Enterprise Linux environments and building
      UBI-based web server containers, what is the importance of disabeling non-UBI
      DNF repositries to ensure that my image contains only Red Hat software that
      I can redistribute, and when should I consider using microdnf instead of dnf
      for these tasks?
    response: null
    contexts: null
    expected_response: When creating a UBI-based web server container from a Containerfile,
      you have to disable all non-UBI DNF repositories to ensure that your image contains
      only Red Hat software that you can redistribute. For UBI minimal images, you
      should use microdnf instead of dnf, for example, with commands like `RUN microdnf
      update -y && rm -rf /var/cache/yum` and `RUN microdnf install httpd -y && microdnf
      clean all`.
    turn_metrics: *id001
