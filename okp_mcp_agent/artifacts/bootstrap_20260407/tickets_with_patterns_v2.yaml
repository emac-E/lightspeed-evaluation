- ticket_key: RSPEED-2536
  query: 'Why does tar fail with ''Cannot utime: Operation not permitted'' and ''Cannot
    change mode'' errors when extracting archives as a non-root user under OpenShift''s
    restricted-v2 Security Context Constraint, and how can this be resolved?'
  expected_response: 'Under OpenShift''s restricted-v2 SCC (introduced as default
    in OCP 4.11+), containers run with randomly assigned high-numbered UIDs from namespace-specific
    ranges and operate with severely restricted capabilities. Official documentation
    confirms that restricted-v2 ''drops all capabilities'' and is ''the most restrictive
    policy that matches the current pod security standards'' (KCS 6975936, KCS 6973044).
    While the documentation does not specifically address tar extraction failures,
    the root cause follows from standard RHEL permission models: tar''s default behavior
    attempts to preserve original file ownership (chown), permissions (chmod), and
    timestamps (utime) from the archive. These operations require elevated privileges
    that randomly-assigned unprivileged UIDs lack under restricted-v2. When these
    syscalls fail with EPERM (Operation not permitted), tar exits with errors. The
    solution is to use tar extraction flags --no-same-owner and --no-same-permissions,
    which instruct tar to skip preservation of original ownership and permissions,
    instead using the extracting user''s UID/GID and applying umask-based permissions.'
  confidence: MEDIUM
  inferred: true
  sources:
  - https://access.redhat.com/solutions/6975936/index.html
  - https://access.redhat.com/articles/6973044/index.html
  - https://access.redhat.com/articles/6844071/index.html
  reasoning: Retrieved documentation confirms restricted-v2 SCC characteristics (random
    namespace UIDs, all capabilities dropped, most restrictive policy) but does not
    specifically document tar extraction failures or solutions. The tar-specific failure
    modes and --no-same-owner/--no-same-permissions solutions are inferred from standard
    RHEL/Linux permission models and tar command behavior, not from official OpenShift
    documentation addressing this scenario.
  extracted_at: '2026-04-07T22:33:00.568898'
  jira_summary: 'rhel-okp CrashLoopBackOff: tar fails under restricted-v2 SCC'
