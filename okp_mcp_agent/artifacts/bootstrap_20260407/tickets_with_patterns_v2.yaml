    /dev/device


    According to Red Hat''s official best practices documentation: "There are few
    workloads where using non-default mkfs.xfs or mount options are required. In most
    cases, the default values will suffice. The filesystem driver probes its underlying
    storage devices and the resulting default values are already optimized." (Source:
    Red Hat KB 203173)


    Key points:

    1. Use defaults: mkfs.xfs automatically calculates optimal parameters including
    allocation group count, log size, and block sizes based on device size

    2. 100TB is supported: XFS officially supports filesystems up to 100TB (Source:
    Red Hat KB 764393)

    3. Avoid manual tuning: Red Hat documentation shows that non-default options can
    cause severe issues. For example, using -n size=64k can cause memory allocation
    deadlocks requiring kernel upgrades to fix (Source: Red Hat KB 1597523)

    4. Mount options matter more: For performance tuning, focus on mount options rather
    than mkfs options. For filesystems >1TB, ensure inode64 mount option is used (default
    in RHEL7+) to avoid inodes being confined to the first 1TB which causes performance
    problems (Source: Red Hat KB 67091)


    The defaults should only be changed if "the specific workload on the machine is
    known to cause problems with the default settings, and can be worked around via
    a configuration change" (Source: Red Hat KB 203173).'
