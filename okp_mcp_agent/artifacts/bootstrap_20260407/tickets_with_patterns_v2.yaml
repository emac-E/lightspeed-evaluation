    ```


    The mokutil utility is part of the mokutil package and is specifically designed
    for managing Machine Owner Keys (MOK) and checking Secure Boot status. When Secure
    Boot is enabled, the command outputs "SecureBoot enabled". When disabled, it outputs
    "SecureBoot disabled".


