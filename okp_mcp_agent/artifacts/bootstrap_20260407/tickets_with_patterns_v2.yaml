  query: Can I run a RHEL 6 container on RHEL 9?
  expected_response: 'No, RHEL 6 container images are unsupported on RHEL 9 hosts
    according to the official Red Hat Enterprise Linux Container Compatibility Matrix.
    The matrix explicitly shows that RHEL 6 images are only supported on RHEL 8 hosts
    and are marked as "Unsupported" for RHEL 9 and RHEL 10 hosts. While containers
    may technically run using Podman or other OCI-compliant runtimes, Red Hat''s documentation
