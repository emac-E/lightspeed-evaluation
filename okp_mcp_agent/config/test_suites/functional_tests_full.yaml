- conversation_group_id: RSPEED_2113
  tag: okp-mcp-functional
  turns:
  - turn_id: '1'
    query: configure lacp bond with name prod and NIC of bond are ens6 and ens8, lacp rate is slow, ip
      of bond is 192.9.8.3/24, gateway 192.9.8.1. provide commands with nmcli
    expected_urls:
    - access.redhat.com/solutions/7134402
    - access.redhat.com/solutions/5069791
    - access.redhat.com/solutions/1526613
    expected_response: |
      Must use correct bonding mode and proper slave configuration. Key facts:
      - Bond mode must be 802.3ad (or mode=4) for LACP — NOT "active-lacp"
      - Bond slaves must be added as separate connections (type bond-slave
        or type ethernet with master set to the bond)
      - Correct example:
        nmcli con add type bond ifname bond0 con-name bond0 bond.options "mode=802.3ad"
        nmcli con add type bond-slave ifname eth0 master bond0
      - Bond options are comma-separated, NOT space-separated
      WRONG if it uses: mode=active-lacp, or omits bond-slave connections
    turn_metrics:
    - custom:url_retrieval_eval
    - custom:keywords_eval
    - ragas:context_precision_without_reference
    - ragas:context_relevance
    - custom:forbidden_claims_eval
    - custom:answer_correctness
    expected_keywords:
    - - 802.3ad
    - - bond-slave
    - - lacp_rate
    forbidden_claims:
    - mode=active-lacp
