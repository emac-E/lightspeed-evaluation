- conversation_group_id: RSPEED-2218
  turns:
  - query: Why does 'rhel-cla start' fail with error 'executable file ramalama not
      found in $PATH' on RHEL 10.1 with podman 5.6.0?
    expected_response: 'This is a known issue (bug RSPEED-2218) in the RHEL command-line
      assistant offline developer preview release available with RHEL 10.1. The error
      ''runtime stderr: executable file ramalama not found in $PATH'' occurs when
      starting rhel-cla.


      Workaround:

      1. For CPU-only systems: Edit ~/.config/rhel-cla/.env and update LLAMACPP_IMAGE
      to: LLAMACPP_IMAGE="quay.io/ramalama/ramalama:6ae863e9f552797b45d0fd8632c4f7ec9b78c430"

      2. For NVIDIA GPU systems: Edit ~/.config/rhel-cla/.env and update LLAMACPP_IMAGE
      to: LLAMACPP_IMAGE="quay.io/ramalama/cuda:0.14"

      3. Start rhel-cla using: rhel-cla start


      Note: RHEL CLA for offline use is in Developer Preview and not intended for
      production use. The system must be registered via RHEL Satellite, RHSM, or RHC
      to use this feature.'
    turn_metrics:
    - custom:url_retrieval_eval
    - ragas:context_relevance
    - ragas:context_precision_without_reference
    - custom:answer_correctness
    expected_urls:
    - https://access.redhat.com/solutions/7134825/index.html
    - https://access.redhat.com/solutions/7136542/index.html
  metadata:
    pattern_id: CONTAINER_UNSUPPORTED_CONFIG
    confidence: HIGH
