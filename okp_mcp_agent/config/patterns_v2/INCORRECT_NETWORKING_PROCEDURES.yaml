- conversation_group_id: RSPEED-2113
  turns:
  - query: How to configure a LACP bond named 'prod' with slave interfaces ens6 and
      ens8, LACP rate slow, IP address 192.9.8.3/24, and gateway 192.9.8.1 using nmcli
      commands on RHEL?
    expected_response: 'To configure a LACP bond using nmcli on RHEL, use the following
      commands:


      1. Create the bond interface:

      ```

      nmcli con add type bond ifname prod con-name prod bond.options "mode=802.3ad,lacp_rate=slow"
      ipv4.method manual ipv4.addresses 192.9.8.3/24 ipv4.gateway 192.9.8.1

      ```


      2. Add slave interfaces:

      ```

      nmcli con add type bond-slave ifname ens6 con-name prod-slave-ens6 master prod

      nmcli con add type bond-slave ifname ens8 con-name prod-slave-ens8 master prod

      ```


      3. Activate the bond:

      ```

      nmcli con up prod

      ```


      Key points verified from RHEL documentation:

      - Mode 4 is equivalent to 802.3ad (LACP): "Bonding Mode 4 ( 802.3ad ) also known
      as LACP (Link Aggregation Control Protocol)" (source: https://access.redhat.com/solutions/666853)

      - LACP rate slow is a valid parameter, as shown in bonding proc output: "LACP
      rate: slow" (source: https://access.redhat.com/solutions/160283)

      - Mode 4/802.3ad requires switch configuration to establish an "EtherChannel"
      or similar port grouping (source: https://access.redhat.com/solutions/67546)

      - All switch ports connected to the bonded interfaces must be assigned to the
      same static/active trunk for proper aggregator ID negotiation (source: https://access.redhat.com/solutions/30469)


      Note: The bond mode must be specified as either ''mode=802.3ad'' or ''mode=4'',
      not ''mode=active-lacp'' which is invalid. Bond options are comma-separated
      within the bond.options parameter.'
    turn_metrics:
    - custom:url_retrieval_eval
    - ragas:context_relevance
    - ragas:context_precision_without_reference
    - custom:answer_correctness
    expected_urls:
    - https://access.redhat.com/solutions/160283
    - https://access.redhat.com/solutions/666853
    - https://access.redhat.com/solutions/67546
    - https://access.redhat.com/solutions/30469
  metadata:
    pattern_id: INCORRECT_NETWORKING_PROCEDURES
    confidence: MEDIUM
