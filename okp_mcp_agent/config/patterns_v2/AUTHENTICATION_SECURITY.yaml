      applications for passing authenticated user context between microservices. The
      ticket describes a software development task: implementing middleware logic
      in a Python application to extract role information (is_org_admin, entitlements)
      from these custom HTTP headers instead of assigning all users a wildcard role.
      This is application-level code implementation, not RHEL system administration,
      IdM configuration, or any RHEL operating system feature.'
