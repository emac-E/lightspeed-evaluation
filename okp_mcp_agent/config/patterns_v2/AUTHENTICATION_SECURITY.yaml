      a RHEL support question or an application development task?
    expected_response: 'This ticket is NOT a Red Hat Enterprise Linux support question.
      While ''Red Hat Identity Management'' (IdM/FreeIPA) is a legitimate RHEL feature
      for enterprise authentication and authorization with RBAC support (documented
      at https://access.redhat.com/articles/1586893), this ticket refers to ''rh-identity''
