- conversation_group_id: RSPEED-1582
  metadata:
    jira_ticket: RSPEED-1582
    jira_url: https://redhat.atlassian.net/browse/RSPEED-1582
    confidence: HIGH
    pattern_id: XFS_FILESYSTEM_ISSUES
  turns:
  - query: How do I shrink an LVM logical volume with XFS filesystem on it?
    expected_response: 'XFS filesystems cannot be shrunk in a supported manner on
      RHEL 6, 7, 8, and 9. According to Red Hat solution article 540013: "At the moment,
      functionality to shrink XFS filesystems is not available in RHEL in a supported
      manner." A request for this feature (Bug 1062667) was CLOSED as WONTFIX due
      to design constraints. The root cause is that "while the XFS file systems can
      be grown while mounted, their size cannot be reduced" - this limitation has
      been discussed upstream for over 10 years but is "deemed to be complex and risky."


      Note: RHEL 10 offers XFS shrink functionality as a Tech Preview with limitations.


      Workarounds:

      1. Backup and restore: Use xfsdump to backup data, destroy the filesystem, create
      a smaller LVM volume, create new XFS filesystem, and restore with xfsrestore

      2. Use xfs_quota to implement project (directory tree) quotas for space limitations
      within the filesystem

      3. Use ext4 filesystem instead if shrinking capability is required, as ext4
      supports both growing and shrinking via resize2fs'
    expected_urls:
    - https://access.redhat.com/solutions/540013/index.html
    expected_keywords: []
    forbidden_claims: []
