  turns:
  - query: How do I pin the vCPUs of a particular VM to the physical cores of NUMA
      node 0 in libvirt dynamically on a running VM, without bringing the VM down?
    expected_response: 'Use the ''virsh vcpupin'' command to dynamically pin vCPUs
      to physical cores on a running VM. First, identify the physical cores on NUMA
      node 0 using ''lscpu'' or ''numactl --hardware''. Then list the VM''s vCPUs
      with ''virsh vcpuinfo <domain>''. Pin each vCPU using ''virsh vcpupin <domain>
      <vcpu-number> <cpu-list>'', for example: ''virsh vcpupin myvm 0 1'' to pin vCPU
      0 to physical core 1, or ''virsh vcpupin myvm 2 2-3'' to pin vCPU 2 to cores
      2-3. Verify the configuration with ''virsh vcpupin <domain>'' (no arguments).
      Note: These changes are not permanent and will be lost after VM migration or
      system reboot. To make changes persistent, modify the VM''s XML configuration
      using ''virsh edit <domain>'' or use the --config flag. The ''virsh emulatorpin''
      command is different - it pins QEMU emulator I/O threads, not vCPUs.'
    expected_urls:
    - https://access.redhat.com/solutions/5955271/index.html
    - https://access.redhat.com/documentation/en-us/red_hat_enterprise_linux/6/html-single/virtualization_tuning_and_optimization_guide/index/index.html
