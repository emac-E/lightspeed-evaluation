    confidence: HIGH
  turns:
  - query: How long is an EUS (Extended Update Support) release supported for in RHEL?
    expected_response: 'An EUS release in RHEL is supported for 24 months from the
      General Availability (GA) date of the minor release. This is the total support
      period, not additional time on top of standard support.


      As stated in the official documentation:

      - "Each Red Hat Enterprise Linux EUS stream is available for 24 months from
      the availability of the minor release." (RHEL 8 EUS FAQ, RHEL 9 EUS FAQ)


      For RHEL 9 and later versions, Enhanced EUS is also available, providing extended
      support:

      - "Each Red Hat Enterprise Linux Enhanced EUS stream is available for 48 months
      from the availability of the minor release." (RHEL 9 EUS FAQ)


      Key clarifications:

      - The 24-month EUS period starts from the minor release GA date, not from the
      end of standard support

      - This applies consistently across RHEL 7, 8, and 9

      - Enhanced EUS (48 months) is available for select RHEL 9 minor releases: 9.0,
      9.2, 9.4, 9.6, and 9.8'
