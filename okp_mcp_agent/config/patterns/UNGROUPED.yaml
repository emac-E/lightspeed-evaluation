  - query: 1. What is an immutable file in RHEL and how is it created? 2. How do you
      install and configure an Apache HTTP web server on RHEL?
    expected_response: '1. An immutable file in RHEL is a file with the immutable
      attribute (i flag) set, which prevents the file from being modified, deleted,
      or renamed, even by the root user. To create an immutable file, use the chattr
      command: ''chattr +i filename''. To verify the immutable attribute is set, use
      ''lsattr filename'' which will show ''----i-------'' in the output. The immutable
      attribute can be removed with ''chattr -i filename''. This is commonly used
      to protect critical system files like /etc/resolv.conf, /etc/sudoers, and /etc/sysctl.conf
      from accidental or malicious changes. As stated in Red Hat Solution 1336303:
      "A file with i immutable attribute can''t be modified. It can''t be deleted
      or renamed. No data can be written to this file even as the root user."


      2. TODO: No official RHEL documentation was retrieved to verify the Apache HTTP
      Server installation and configuration steps. The hypothesis provided needs verification
