    expected_response: 'RHEL System Roles is a collection of Ansible roles and modules
      that provide a stable and consistent configuration interface to automate and
      manage multiple releases of Red Hat Enterprise Linux. Each role has its own
      support matrix, and support varies based on whether the system is the control
      node (running Ansible) or a managed node (being configured).


      Control node requirements: All RHEL System Roles require the control node to
      run RHEL 8, 9, or 10.


      Managed node support varies by role:

      - Older, established roles (selinux, network, kdump, timesync) support RHEL
      6, 7, 8, 9, and 10 as managed nodes

      - Some roles like storage and firewall support RHEL 7, 8, 9, and 10

      - Newer roles (tlog, crypto_policies, aide, fapolicyd) only support RHEL 8,
      9, and 10

      - Some newer roles like keylime_server only support RHEL 9.1+ as managed nodes


      For example, the selinux role supports ''RHEL 6, 7, 8, 9, 10'' as managed nodes
      and ''RHEL 8, 9, 10'' as control nodes, while the crypto_policies role supports
      only ''RHEL 8, 9, 10'' for both managed nodes and control nodes.


      Users must consult the official RHEL System Roles support matrix at https://access.redhat.com/articles/3050101
      to determine the exact RHEL version compatibility for each individual role,
      as there is no single answer that applies to all roles in the collection.'
