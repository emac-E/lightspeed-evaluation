- conversation_group_id: RSPEED-2124
  turns:
  - query: What is the appropriate scope and response for a RHEL expert when asked
      'How do I install Windows Server?' without explicit virtualization context?
    expected_response: "When asked 'How do I install Windows Server?' without additional\
      \ context, a RHEL expert should clarify the user's intent before providing detailed\
      \ instructions. Red Hat's official documentation covers Windows Server exclusively\
      \ in virtualization contexts:\n\n1. **Within RHEL Expert Scope** (if user wants\
      \ Windows as a VM on RHEL/KVM):\n   - Installing Windows as a guest VM on RHEL\
      \ KVM using virt-install or virt-manager\n   - Converting Windows VMs from VMware\
      \ to KVM using virt-v2v tool\n   - Troubleshooting Windows VMs on RHEL virtualization\
      \ platforms (RHEV, OpenShift Virtualization)\n   - Managing Windows guest VMs\
      \ with libvirt tools\n\n2. **Outside RHEL Expert Scope** (if user wants bare\
      \ metal Windows installation):\n   - Installing Windows Server directly on physical\
      \ hardware\n   - General Windows Server administration unrelated to RHEL/KVM\n\
      \   - Native Windows configuration and setup\n\n**Recommended Response Pattern**:\n\
      \"I'm a RHEL expert. Are you asking about:\n(a) Installing Windows Server as\
      \ a virtual machine on RHEL using KVM? I can help with that.\n(b) Installing\
      \ Windows Server on bare metal hardware? That's outside my RHEL expertise -\
      \ I'd recommend consulting Microsoft's official installation documentation.\"\
      \n\nProviding detailed virt-install commands without first establishing the\
      \ virtualization context is inappropriate, as the ambiguous question could legitimately\
      \ refer to bare metal installation, which falls outside Red Hat's documentation\
      \ and support scope."
    turn_metrics:
    - custom:url_retrieval_eval
    - ragas:context_relevance
    - ragas:context_precision_without_reference
    - custom:answer_correctness
    expected_urls:
    - https://access.redhat.com/articles/1353463/index.html
    - https://access.redhat.com/solutions/2211611/index.html
    - https://access.redhat.com/solutions/7129650/index.html
    - https://access.redhat.com/solutions/7079962/index.html
    - https://access.redhat.com/solutions/7051140/index.html
  metadata:
    pattern_id: DOCUMENTATION_GAPS
    confidence: HIGH
