- conversation_group_id: RSPEED-2136
  turns:
  - query: How to prepare a custom SELinux policy based on AVC messages?
    expected_response: "Creating custom SELinux policy modules based on AVC messages\
      \ is a documented procedure in RHEL, though Red Hat officially states that 'Red\
      \ Hat doesn't support creating custom SELinux policy modules, because this falls\
      \ outside of the Production Support Scope of Coverage' (https://access.redhat.com/articles/5494701).\
      \ Despite this support policy caveat, Red Hat provides comprehensive documentation\
      \ and tools for this procedure, and Red Hat solutions frequently use this approach\
      \ as verified workarounds.\n\nThe standard procedure involves:\n\n1. **Collect\
      \ AVC denials**: Use ausearch to gather recent denials:\n   ```\n   ausearch\
      \ -m avc -ts recent\n   ```\n\n2. **Generate policy module**: Use audit2allow\
      \ to create a policy module:\n   ```\n   ausearch -m avc -ts recent | audit2allow\
      \ -M <module_name>\n   ```\n\n3. **Review generated policy**: Examine the .te\
      \ file to understand security implications:\n   ```\n   cat <module_name>.te\n\
      \   ```\n\n4. **Install the policy module**: Apply the compiled policy:\n  \
      \ ```\n   semodule -i <module_name>.pp\n   ```\n\n5. **Verify**: Re-test the\
      \ application to confirm the policy resolves the denials.\n\nRed Hat provides\
      \ the required tools (policycoreutils-python-utils package) and extensive documentation\
      \ on creating custom policy modules wisely (https://access.redhat.com/articles/5494701).\
      \ Multiple verified Red Hat solutions demonstrate this procedure, including\
      \ solutions 7126448, 4400471, and 5030621. While Red Hat recommends consulting\
      \ experts and understanding security implications before creating custom policies,\
      \ the procedure itself is well-documented and the tools are officially provided."
    turn_metrics:
    - custom:url_retrieval_eval
    - ragas:context_relevance
    - ragas:context_precision_without_reference
    - custom:answer_correctness
    expected_urls:
    - https://access.redhat.com/articles/5494701
    - https://access.redhat.com/solutions/7126448
    - https://access.redhat.com/solutions/4400471
    - https://access.redhat.com/solutions/5030621
  metadata:
    pattern_id: SECURITY_POLICY_UNSUPPORTED_CONFIG
    confidence: HIGH
