- conversation_group_id: RSPEED-1724
  turns:
  - query: How do I change the EFI boot order on a UEFI-based RHEL system?
    expected_response: 'To change the EFI boot order on a UEFI-based RHEL system,
      use the ''efibootmgr'' utility, which manages UEFI firmware boot settings stored
      in NVRAM. The EFI boot order is NOT controlled by editing grub.cfg. As confirmed
      in Red Hat documentation, when you install RHEL, ''Anaconda creates a UEFI boot
      entry named Red Hat Enterprise Linux which points to hard disk''s (EFI Partition)/EFI/redhat/shimx64.efi
      executable'' and establishes a boot order at the firmware level (e.g., ''Red
      Hat Enterprise Linux, UEFI Misc Device, UEFI QEMU DVD-ROM QM00001''). To manage
      this boot order: ''efibootmgr'' displays current boot entries and order, ''efibootmgr
      -n 000x'' sets a one-time BootNext entry for the next boot only, and ''efibootmgr
      -o 000x,000y,000z'' permanently changes the boot order. The EFI firmware boot
      order (which bootloader the firmware loads) is separate from the GRUB menu order
      (which OS/kernel GRUB presents after it''s loaded).'
