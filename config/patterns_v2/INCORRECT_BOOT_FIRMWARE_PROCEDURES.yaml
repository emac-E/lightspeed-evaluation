- conversation_group_id: RSPEED-1723
  turns:
  - query: How do I update the GRUB bootloader package in RHEL?
    expected_response: 'To update GRUB in RHEL, use the standard package manager to
      update the GRUB2 packages:


      **For RHEL 8+:**

      ```

      sudo dnf update grub2-common grub2-tools

      ```


      **For RHEL 7:**

      ```

      sudo yum update grub2-common grub2-tools

      ```


      This updates the GRUB package itself. Note that updating the GRUB package is
      different from regenerating the GRUB configuration file:


      - **Package update** (above commands): Updates GRUB software to newer version

      - **Configuration regeneration**: Updates boot menu entries, done with `grub2-mkconfig
      -o /boot/grub2/grub.cfg`


      Configuration regeneration is typically handled automatically during kernel
      updates. Manual regeneration is only needed when:

      - Changing boot parameters in /etc/default/grub

      - Working around specific bugs (e.g., RHEL 10 with GRUB_ENABLE_BLSCFG=false)

      - Manually removing stale kernel entries


      **On BIOS-based systems only:** After updating the GRUB package, you may need
      to reinstall the bootloader to the MBR: `grub2-install /dev/sdX` (where sdX
      is the boot disk). UEFI systems do not require this step.


      Sources:

      - https://access.redhat.com/solutions/7126344 (RHEL 10 grub.cfg update issue
      - shows distinction between package update and config regeneration)

      - https://access.redhat.com/solutions/4110091 (RHEL 7 grub2-common update procedure)

      - https://access.redhat.com/solutions/3682321 (grub2-common update using yum)'
