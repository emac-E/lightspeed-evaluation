- conversation_group_id: RSPEED-1726
  turns:
  - query: How do I recreate the GRUB configuration file on Red Hat Enterprise Linux?
    expected_response: 'To recreate the GRUB configuration file on RHEL, use the grub2-mkconfig
      command:


      For BIOS-based systems (RHEL 7, 8, 9, 10):

      # grub2-mkconfig -o /boot/grub2/grub.cfg


      For UEFI-based systems:

      # grub2-mkconfig -o /boot/efi/EFI/redhat/grub.cfg


      This command generates a new GRUB configuration file by scanning /etc/default/grub
      and scripts in /etc/grub.d/. It is typically used after modifying kernel parameters
      in /etc/default/grub.


      For RHEL 8, 9, and 10, you can alternatively use grubby to update kernel parameters:

      # grubby --update-kernel=ALL --args="parameter=value"

      # grub2-mkconfig -o /boot/grub2/grub.cfg


      Note: The grub2-mkconfig command scans all disks on the system. If you have
      many disks and the command appears to hang, add GRUB_DISABLE_OS_PROBER=true
      to /etc/default/grub before running grub2-mkconfig.'
