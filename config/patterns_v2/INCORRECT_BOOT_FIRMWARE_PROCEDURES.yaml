- conversation_group_id: RSPEED-1722
  turns:
  - query: How do I disable Secure Boot on a Red Hat Enterprise Linux system?
    expected_response: "Secure Boot is a UEFI firmware feature that must be disabled\
      \ through the system's firmware settings, not through the operating system.\n\
      \nFor physical systems:\n1. Reboot the system and press the BIOS key (F2, F10,\
      \ Del, or Esc) during boot to enter the Boot Manager/UEFI setup\n2. Navigate\
      \ to find the Secure Boot option (may be called 'Trusted Boot' or similar depending\
      \ on vendor)\n3. Set it to 'Disabled'\n4. Save and Exit\n5. Verify after reboot:\
      \ `mokutil --sb-state` should show 'SecureBoot disabled'\n\nFor VMware virtual\
      \ machines:\n1. Power off the VM\n2. In vSphere Client, right-click the VM and\
      \ select 'Edit Settings'\n3. Click VM Options tab → expand Boot Options\n4.\
      \ Ensure firmware is set to EFI\n5. Uncheck the box next to 'Secure Boot'\n\
      6. Click OK to save\n\nFor KVM/libvirt VMs on RHEL 8, configure the domain XML\
      \ with enrolled-keys disabled:\n```xml\n<os firmware='efi'>\n  <firmware>\n\
      \    <feature enabled='yes' name='secure-boot'/>\n    <feature enabled='no'\
      \ name='enrolled-keys'/>\n  </firmware>\n</os>\n```\n\nNote: MOK (Machine Owner\
      \ Key) enrollment is NOT used to disable Secure Boot. MOK enrollment is used\
      \ to add trusted keys when keeping Secure Boot enabled, allowing custom-signed\
      \ kernels and modules to run. Contact your hardware vendor if you encounter\
      \ issues disabling Secure Boot."
