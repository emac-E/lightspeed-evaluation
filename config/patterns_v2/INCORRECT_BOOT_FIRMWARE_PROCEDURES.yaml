- conversation_group_id: RSPEED-1721
  turns:
  - query: How to check if Secure Boot is enabled on a running RHEL system
    expected_response: 'The correct method to check if Secure Boot is enabled on a
      running RHEL system is to use the command `mokutil --sb-state`. This is the
      official Red Hat documented approach.


      According to Red Hat''s verified solution "How to disable Secure Boot on VMware
      virtual machine?" (applies to RHEL 7, 8, 9, and 10), the diagnostic step to
      "Check the current status of Secure Boot on the system" is:


      ```

      # mokutil --sb-state

      SecureBoot enabled

      ```


      The mokutil utility is part of the mokutil package and is specifically designed
      for managing Machine Owner Keys (MOK) and checking Secure Boot status. When
      Secure Boot is enabled, the command outputs "SecureBoot enabled". When disabled,
      it outputs "SecureBoot disabled".


      Alternative methods include:

      - Checking `/sys/firmware/efi/efivars/SecureBoot-*` files directly

      - Using `bootctl status` on systemd-based systems (shows "Secure Boot: enabled/disabled")


      The CLA answer suggesting the use of the `crash` utility is fundamentally incorrect.
      The crash utility is a kernel crash dump analysis tool that requires a vmcore
      file generated during system crashes. It is designed for post-mortem analysis
      of crashed systems, not for checking the Secure Boot status of live, running
      systems.'
    turn_metrics:
    - custom:url_retrieval_eval
