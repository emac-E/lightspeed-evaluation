  turns:
  - query: How many CPU cores does this RHEL 9.7 system have?
    expected_response: 'The answer depends on which CPU metric you need:


      **Physical CPU sockets**: `grep physical.id /proc/cpuinfo | sort -u | wc -l`


      **Cores per socket**: `grep cpu.cores /proc/cpuinfo | sort -u` (shows value
      like ''cpu cores : 4'')


      **Total CPU cores**: Multiply cores per socket by number of physical CPUs


      **Logical processors** (total processing units including hyperthreading): `grep
      processor /proc/cpuinfo | wc -l` or `nproc`


      For the most user-friendly output showing all CPU topology information, use
      `lscpu` which displays sockets, cores per socket, threads per core, and total
      CPUs.


      Example: A system with 2 sockets × 4 cores per socket = 8 total physical cores.
      With hyperthreading, this appears as 16 logical processors to the OS.


      Source: Red Hat Solution 224883 "How to find the number of physical cpus, cpu
      cores, and logical cpus" (verified for RHEL 4-9)'
