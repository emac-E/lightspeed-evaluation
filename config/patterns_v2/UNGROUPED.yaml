- conversation_group_id: RSPEED-1759
  turns:
  - query: Does dbus-broker automatically detect newly installed D-Bus service files
      after RPM package installation, or does it require a manual reload via systemctl
      or busctl?
    expected_response: 'dbus-broker does not automatically detect newly installed
      D-Bus service files placed in /usr/share/dbus-1/system-services/ during package
      installation. The D-Bus service must be made aware of new service files through
      one of these methods:


      1. **System reboot** (automatic but impractical)

      2. **Manual reload**: `systemctl reload dbus-broker` or `busctl --system call
      org.freedesktop.DBus /org/freedesktop/DBus org.freedesktop.DBus ReloadConfig`

      3. **RPM %post scriptlet** (recommended): Add to the package spec file:


      ```bash

      %post

      systemctl reload dbus-broker.service >/dev/null 2>&1 || :

      ```


      The %post scriptlet approach is standard practice in RHEL packaging for services
      that install D-Bus activation files. The `|| :` ensures the scriptlet doesn''t
      fail if dbus-broker is not running. This is the recommended solution for the
      command-line-assistant package to ensure clad.service becomes bus-activatable
      immediately after installation.


      Note: While RPM packaging best practices confirm that %post scriptlets are the
      standard mechanism for post-installation service configuration tasks, the specific
      technical behavior of dbus-broker''s service file detection was not directly
      confirmed in the retrieved documentation.'
    turn_metrics:
    - custom:url_retrieval_eval
    - ragas:context_relevance
    - ragas:context_precision_without_reference
    - custom:answer_correctness
