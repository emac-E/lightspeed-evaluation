- conversation_group_id: RSPEED-1743
  turns:
  - query: Can the hammer command be used to upgrade a Red Hat Satellite Capsule Server?
    expected_response: 'No, the hammer command cannot be used to upgrade Capsule Servers.
      Capsule upgrades are performed using satellite-installer or satellite-maintain
      tools, not hammer CLI.


      The documented upgrade methods are:

      1. Using satellite-installer: `satellite-installer --scenario capsule --upgrade`
      (as shown in solutions 2688931, 7137198, and 4321811)

      2. Using satellite-maintain: `satellite-maintain upgrade run --target-version
      6.Y` (as shown in solution 7087453)


      The hammer CLI is used for Capsule content management and administrative tasks
      such as:

      - Managing lifecycle environments: `hammer capsule content available-lifecycle-environments`,
      `hammer capsule content add-lifecycle-environment`

      - Synchronization operations: `hammer capsule content synchronize`, `hammer
      capsule content synchronization-status`

      - Content management: `hammer capsule content lifecycle-environments`


      There is no `hammer capsule upgrade` command. Attempting to use hammer for upgrades
      would be incorrect.'
