- conversation_group_id: RSPEED-2004
  turns:
  - query: How do I resolve CLA authentication failures when RHEL is registered to
      Red Hat Satellite 6.17+ instead of the cloud service?
    expected_response: "To resolve CLA authentication failures when using Red Hat\
      \ Satellite as the Lightspeed backend, perform the following steps:\n\n1. **Update\
      \ the Lightspeed endpoint configuration** (Primary fix):\n   - Edit `/etc/xdg/command-line-assistant/config.toml`\n\
      \   - Set: `endpoint = \"https://satellite.example.com/api/lightspeed/v1\"`\
      \ (replace with your actual Satellite FQDN)\n   - Restart the clad service:\
      \ `systemctl restart clad`\n   - This is required because Satellite 6.17+ proxies\
      \ Lightspeed API requests through the Satellite server\n\n2. **If Satellite\
      \ uses self-signed certificates** (Additional step when applicable):\n   - Copy\
      \ the Satellite CA certificate to the system trust store: `cp /path/to/satellite_ca.crt\
      \ /etc/pki/ca-trust/source/anchors/`\n   - Update the system trust bundles:\
      \ `update-ca-trust`\n   - The CLA relies on the system-wide trust store to validate\
      \ HTTPS connections; without the Satellite CA certificate, authentication will\
      \ fail even with correct endpoint configuration\n\n**Prerequisites**: Red Hat\
      \ Satellite 6.17 or later (issue SAT-32475 was fixed in this version)\n\n**Troubleshooting**:\
      \ Enable debug logging by setting `level = \"DEBUG\"` under `[logging]` in config.toml\
      \ and check logs with `journalctl -u clad --no-pager`\n\nSource: Red Hat Solutions\
      \ 7121796, 7132350"
