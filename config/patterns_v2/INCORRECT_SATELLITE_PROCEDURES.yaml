- conversation_group_id: RSPEED-1634
  turns:
  - query: Can I use the rhc command to register a RHEL system to Red Hat Satellite?
    expected_response: 'No, the rhc command cannot be used to register a RHEL system
      to Red Hat Satellite. According to Red Hat documentation, "RHC client is not
      a replacement for insights-client or subscription-manager, it is an additional
      utility that complements the user experience around hosted Red Hat Insights
      services provided by Red Hat Hybrid Cloud Console." The rhc tool is specifically
      designed for connecting RHEL systems directly to Red Hat Hybrid Cloud Console
      and Red Hat Insights services, not for Satellite registration.


      Furthermore, the official documentation explicitly states that "The rhcd service
      only works when the client is directly registered to RHSM or Red Hat Hybrid
      Cloud console" and "the clients registered through the Satellite server should
      not have the rhcd service running on them." For systems managed by Red Hat Satellite,
      the documentation recommends configuring Cloud Connector on the Satellite server
      itself, not using rhc on client systems.


      To register a RHEL system to Red Hat Satellite, use one of these correct methods:

      1. subscription-manager with bootstrap scripts or manual registration commands

      2. Global Registration method (available in Satellite 6.11+) which generates
      a curl-based registration script


      The rhc command is intended only for systems that are NOT managed by Satellite
      and need direct connection to Red Hat Hybrid Cloud Console for features like
      Insights remediations.'
    turn_metrics:
    - custom:url_retrieval_eval
    - ragas:context_relevance
    - ragas:context_precision_without_reference
    - custom:answer_correctness
    expected_urls:
    - https://access.redhat.com/articles/rhc/index.html
    - https://access.redhat.com/solutions/7018570/index.html
  metadata:
    pattern_id: INCORRECT_SATELLITE_PROCEDURES
    confidence: HIGH
