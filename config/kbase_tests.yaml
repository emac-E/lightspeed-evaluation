- conversation_group_id: KBASE-057
  description: "Create a custom TuneD performance profile on RHEL 7/8/9"
  tag: evals_kbase
  turns:
    - turn_id: turn1
      query: "How do I create a custom TuneD profile on RHEL 7, 8, or 9?"
      response: null
      contexts: null
      expected_response: |
        On RHEL 7/8/9, system profiles are in /usr/lib/tuned/ and custom profiles go in /etc/tuned/. Create a directory: 'mkdir /etc/tuned/myprofile'. Create /etc/tuned/myprofile/tuned.conf with [main] include=<base-profile> to inherit settings, then add custom sections such as [cpu] force_latency=1, [vm] transparent_hugepages=never, [disk] elevator=deadline, [sysctl] kernel.sysrq=1, or [script] script=/etc/tuned/myprofile/myscript.sh for custom scripts. Activate with 'tuned-adm profile myprofile'.
      turn_metrics:
        - custom:answer_correctness

- conversation_group_id: KBASE-058
  description: "Tune TCP socket buffers for high-latency WAN connections"
  tag: evals_kbase
  turns:
    - turn_id: turn1
      query: "How do I tune RHEL for better TCP performance over a high-latency WAN connection?"
      response: null
      contexts: null
      expected_response: |
        Calculate the Bandwidth Delay Product (BDP) = connection speed (bytes/sec) x latency (seconds). For 10 Gbps with 17ms latency: (10*10^9/8) * 0.017 = 21,250,000 bytes. Set socket buffer maximums to ~2.5x BDP in /etc/sysctl.conf: net.core.rmem_max=53125000, net.core.wmem_max=53125000, net.ipv4.tcp_rmem='8192 262144 53125000', net.ipv4.tcp_wmem='8192 262144 53125000'. Also enable: net.ipv4.tcp_window_scaling=1, net.ipv4.tcp_timestamps=1, net.ipv4.tcp_sack=1. Disable slow start after idle: net.ipv4.tcp_slow_start_after_idle=0.
      turn_metrics:
        - custom:answer_correctness

- conversation_group_id: KBASE-059
  description: "kdump fails on Hyper-V/Proxmox VM - no memory reserved for crash kernel"
  tag: evals_kbase
  turns:
    - turn_id: turn1
      query: "Kdump fails to start on a Hyper-V or Proxmox VM with 'No memory reserved for crash kernel' and 'crashkernel: invalid size'. What is the cause?"
      response: null
      contexts: null
      expected_response: |
        The initial system memory allocated by the hypervisor at boot is smaller than the crashkernel reservation size. Hyper-V and Proxmox have memory hotplug features that allocate memory on demand, but the initial allocation may be too small for the crashkernel reservation. The message 'crashkernel: invalid size' means the crashkernel size exceeds the total system memory at boot time. The fix is to increase the startup/minimum memory assigned to the VM in the hypervisor settings. After booting, 'free' shows a much larger memory total than what was available during early boot when the crashkernel reservation was attempted.
      turn_metrics:
        - custom:answer_correctness

- conversation_group_id: KBASE-060
  description: "Kdump fails silently on kernel-rt with EFI boot on RHEL 8"
  tag: evals_kbase
  turns:
