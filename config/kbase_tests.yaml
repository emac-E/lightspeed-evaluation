      expected_response: |
        This is a known issue affecting kernel-rt on EFI-boot systems starting from RHEL 8.4 GA (kernel-rt-4.18.0-305.rt7.72.el8). When a crash is triggered, the kernel panics but the kdump kernel is never invoked. The system reboots directly into the normal kernel without capturing a vmcore, even though 'Kdump: loaded' is shown. This has been observed on VMware and other EFI-boot environments running kernel-rt.
      turn_metrics:
