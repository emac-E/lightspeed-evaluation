- conversation_group_id: KBASE-076
  description: "Third-party RPM fails on RHEL 10 due to /bin/ path dependency"
  tag: evals_kbase
  turns:
    - turn_id: turn1
      query: "A third-party RPM package fails to install on RHEL 10 with 'nothing provides /bin/rm'. Why does this happen?"
      response: null
      contexts: null
      expected_response: |
        RHEL 10 removed backward-compatibility RPM metadata that previously listed /bin/* paths as provided by coreutils. Since RHEL 7, /bin has been a symlink to /usr/bin, but until RHEL 9 compatibility entries existed in RPM metadata for /bin/* paths. RHEL 10 removed these following Fedora packaging guideline updates. Packages requiring /bin/rm instead of /usr/bin/rm will fail. This must be fixed by the third-party vendor updating their RPM spec to use /usr/bin/ paths.
      turn_metrics:
        - custom:answer_correctness

- conversation_group_id: KBASE-077
  description: "Podman auth file does not support glob/wildcard URLs for registries"
  tag: evals_kbase
  turns:
    - turn_id: turn1
      query: "Can I use wildcard patterns like '*.redhat.io' in the podman auth.json file to match multiple registry subdomains?"
      response: null
      contexts: null
      expected_response: |
        No. Podman, buildah, and skopeo do not support glob URLs or prefix-matched paths in their auth files. While Kubernetes config.json supports glob patterns for registry subdomains, Red Hat container tools require exact registry hostnames. Using '*.redhat.io' results in 'unable to retrieve auth token: unauthorized'. Each registry subdomain must be listed individually in the auth file.
      turn_metrics:
        - custom:answer_correctness

- conversation_group_id: KBASE-078
  description: "Configure corosync logging in RHEL HA pacemaker cluster"
  tag: evals_kbase
  turns:
