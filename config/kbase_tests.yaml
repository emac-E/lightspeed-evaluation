- conversation_group_id: KBASE-079
  description: "iptables ICMP type 15/16 rules not visible in nft list ruleset"
  tag: evals_kbase
  turns:
    - turn_id: turn1
      query: "I added iptables rules for ICMP type 15 and 16 but 'nft list ruleset' shows them as opaque 'xt match icmp' without the type. Are the rules working?"
      response: null
      contexts: null
      expected_response: |
        Yes, the rules are functional. This is a display bug in the iptables-to-nftables translation layer (libxtables). ICMP types 15 (information-request) and 16 (information-reply) are missing from the iptables-translate lookup table. The rules appear as 'xt match "icmp"' in nft output but 'iptables-save' correctly shows them with ICMP types intact. In native nftables, use 'info-request' and 'info-reply' names or numeric types. Fix planned for RHEL 10 in JIRA RHEL-85286.
      turn_metrics:
        - custom:answer_correctness

- conversation_group_id: KBASE-080
  description: "View user systemd service logs without systemd-journal group"
  tag: evals_kbase
  turns:
    - turn_id: turn1
      query: "A non-root user gets 'No journal files were opened due to insufficient permissions' when viewing their systemd user service logs and cannot be added to systemd-journal group. How do I fix this?"
      response: null
      contexts: null
      expected_response: |
        Configure the systemd journal for persistent storage. By default on RHEL 8, journal data is stored in /run/log/journal (volatile) with restrictive permissions. Enable persistent storage by creating /var/log/journal or setting Storage=persistent in /etc/systemd/journald.conf, then restart systemd-journald. This allows users to access their own journal entries without being a member of the systemd-journal group.
      turn_metrics:
        - custom:answer_correctness
