      query: "How do I change the LUKS encryption key size on the root volume of a RHEL 9 system to 256 bits?"
      response: null
      contexts: null
      expected_response: |
        During installation via kickstart, add to %post: echo -n "<password>" | cryptsetup reencrypt --key-size=256 /dev/vda2 --key-file=-. After installation, check the current key size with 'cryptsetup status /dev/mapper/luks-<uuid>'. To change: 'cryptsetup reencrypt --key-size=256 /dev/vda2' and enter the passphrase when prompted. This may take several minutes depending on disk size. Verify the new key size with 'cryptsetup status'. The default RHEL 9 LUKS2 setup uses aes-xts-plain64 with a 512-bit key.
      turn_metrics:
        - custom:answer_correctness

- conversation_group_id: KBASE-071
  description: "rsyslog fails to start at boot with rate limit exceeded"
  tag: evals_kbase
  turns:
    - turn_id: turn1
      query: "rsyslog fails at boot with 'Start request repeated too quickly' but starts fine manually. What is wrong?"
      response: null
      contexts: null
      expected_response: |
        The logrotate configuration is missing the 'sharedscripts' directive. Without it, the postrotate script (systemctl -s HUP kill rsyslog.service) runs once per log file instead of once per logrotate run. Multiple rapid SIGHUPs cause rsyslog to stop and restart repeatedly, exceeding systemd's rate limit (DefaultStartLimitBurst=5 in 10 seconds). Fix by adding 'sharedscripts' to /etc/logrotate.d/rsyslog before the postrotate block.
      turn_metrics:
        - custom:answer_correctness

- conversation_group_id: KBASE-072
  description: "Chrony cannot sync due to minsources misconfiguration"
  tag: evals_kbase
  turns:
    - turn_id: turn1
      query: "Chrony reports 'Can't synchronise: not enough selectable sources' even though NTP sources are configured. Why?"
      response: null
      contexts: null
      expected_response: |
        The minsources directive in /etc/chrony.conf is set to a value greater than the number of configured NTP sources. For example, minsources=2 with only 1 source configured will prevent synchronization. Fix by either commenting out minsources (defaults to 1) or setting it equal to or less than the number of configured time sources. Verify with 'chronyc sources' and 'grep minsources /etc/chrony.conf'.
      turn_metrics:
        - custom:answer_correctness

- conversation_group_id: KBASE-073
  description: "Reset broken PAM configuration in rescue mode after lockout"
  tag: evals_kbase
  turns:
    - turn_id: turn1
      query: "I am locked out of my RHEL 8/9 system due to a broken PAM configuration. How do I recover?"
      response: null
      contexts: null
      expected_response: |
        Boot into rescue mode: at GRUB press e, add 'rd.break' to the linux line, press Ctrl+X. At switch_root, remount root read-write: 'mount -o remount,rw /sysroot'. Chroot: 'chroot /sysroot'. Check PAM files: /etc/pam.d/system-auth, /etc/pam.d/password-auth. Check authselect status: 'authselect check'. Reset PAM to defaults: 'authselect select sssd with-mkhomedir --force'. Exit chroot and exit to reboot. The root cause is typically manual PAM edits outside of authselect.
      turn_metrics:
        - custom:answer_correctness

- conversation_group_id: KBASE-074
  description: "RHEL 8.10 kernel memory leak with Transparent Huge Pages"
  tag: evals_kbase
  turns:
    - turn_id: turn1
      query: "After updating to kernel-4.18.0-553.81.1.el8_10, the system frequently runs out of memory with no single process consuming excessive amounts. What is happening?"
      response: null
      contexts: null
      expected_response: |
        This is a known memory leak in RHEL 8.10 kernels starting from 4.18.0-553.81.1 when Transparent Huge Pages (THP) and swap are both enabled. Fixed in kernel-4.18.0-553.94.1.el8_10 via RHSA-2026:0759. Workarounds: (1) Boot the unaffected kernel 4.18.0-553.80.1.el8_10. (2) Disable THP. (3) For Shared Memory THPs, also run 'echo deny > /sys/kernel/mm/transparent_hugepage/shmem_enabled'. Verify THP status with 'cat /sys/kernel/mm/transparent_hugepage/enabled' and check AnonHugePages/ShmemHugePages in /proc/meminfo.
      turn_metrics:
        - custom:answer_correctness

