      query: "How do I configure and change the logging level for corosync in a RHEL High Availability pacemaker cluster?"
      response: null
      contexts: null
      expected_response: |
        Stop the cluster: 'pcs cluster stop --all'. Edit the logging {} block in /etc/corosync/corosync.conf. Key directives: to_logfile: yes with logfile: /var/log/cluster/corosync.log, to_syslog: yes, to_stderr: yes. Set priorities with logfile_priority and syslog_priority (values: alert, crit, err, warning, notice, info). Enable debug: 'debug: on'. Add 'timestamp: on'. Sync changes: 'pcs cluster sync'. Reload: 'pcs cluster reload corosync'. Start: 'pcs cluster start --all'. Default logging is to syslog and stderr.
      turn_metrics:
