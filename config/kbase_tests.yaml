- conversation_group_id: KBASE-061
  description: "cgroup v1 no longer supported in RHEL 10"
  tag: evals_kbase
  turns:
    - turn_id: turn1
      query: "Can I configure RHEL 10 to use cgroup v1 instead of cgroup v2?"
      response: null
      contexts: null
      expected_response: |
        No. cgroup v1 support is deprecated by systemd and only cgroup v2 is available in RHEL 10. Even adding 'systemd.unified_cgroup_hierarchy=0' to kernel parameters results in a warning ('Legacy cgroup v1 configured. This will stop being supported soon. Will proceed with cgroup v2 after 30 s.') and the system boots with cgroup v2 anyway. RHEL 8 defaulted to cgroup v1, RHEL 9 defaulted to v2 but supported v1, and RHEL 10 only supports v2. Setting SYSTEMD_CGROUP_ENABLE_LEGACY_FORCE=1 can temporarily force v1 but is not recommended and will be removed in future releases.
      turn_metrics:
        - custom:answer_correctness

- conversation_group_id: KBASE-062
  description: "libhugetlbfs not available in RHEL 9 or RHEL 10"
  tag: evals_kbase
  turns:
    - turn_id: turn1
      query: "Why is libhugetlbfs not available in RHEL 9 and RHEL 10, and what are the alternatives for HugePage-backed memory allocation?"
      response: null
      contexts: null
      expected_response: |
        libhugetlbfs is incompatible with changes to the glibc memory allocator (v2.32+). The upstream project disabled hugepage-backed malloc due to deprecation of __morecore in glibc. RHEL 9 ships glibc v2.34, making libhugetlbfs unfeasible. Alternatives: (1) Use kernel HugeTLB APIs directly (mmap with MAP_HUGETLB, shmget with SHM_HUGETLB) as documented in the kernel hugetlbpage documentation. (2) On RHEL 10, use the glibc tunable glibc.malloc.hugetlb which allows either Transparent HugePages or HugeTLB pages via the glibc memory allocator. It is unlikely libhugetlbfs will be reintroduced.
      turn_metrics:
        - custom:answer_correctness

- conversation_group_id: KBASE-063
  description: "sendmail removed from RHEL 10"
  tag: evals_kbase
  turns:
    - turn_id: turn1
      query: "Is sendmail available in RHEL 10?"
      response: null
      contexts: null
      expected_response: |
        No. sendmail has been removed from RHEL 10 and is listed in the removed features in the RHEL 10 release notes. It was deprecated since RHEL 7 and available (but deprecated) throughout RHEL 8 and RHEL 9 AppStream for their entire lifecycle. Red Hat recommends migrating to Postfix as the replacement MTA.
      turn_metrics:
        - custom:answer_correctness

- conversation_group_id: KBASE-064
  description: "BIND auto-dnssec deprecated on RHEL 10"
  tag: evals_kbase
  turns:
    - turn_id: turn1
      query: "After upgrading to RHEL 10, BIND logs deprecation warnings about the 'auto-dnssec' option. How do I migrate?"
      response: null
      contexts: null
      expected_response: |
        The auto-dnssec option is deprecated in BIND 9.18 (shipped with RHEL 10) and will be removed in BIND 9.19+. Replace it with dnssec-policy. In /etc/named.conf, change zone configurations from 'auto-dnssec maintain;' to 'dnssec-policy default;'. Example: zone "example.com" { type master; file "example.com"; dnssec-policy default; inline-signing yes; }. Validate with 'named-checkconf'. The dnssec-policy framework provides automated DNSSEC key generation, rollover, and signing.
      turn_metrics:
        - custom:answer_correctness

- conversation_group_id: KBASE-065
  description: "Mount CIFS share with SMB 1 protocol on RHEL 9"
  tag: evals_kbase
  turns:
    - turn_id: turn1
      query: "How do I mount a CIFS share using the SMB 1 (vers=1.0) protocol on RHEL 9?"
      response: null
      contexts: null
      expected_response: |
        RHEL 9 supports SMB 1 but does not use it by default. On the Samba server, set 'server min protocol = NT1' in the [global] section of /etc/samba/smb.conf. On the RHEL 9 client, mount using: 'mount -t cifs //server/share /mount_point -o vers=1.0'. Verify with 'cat /proc/self/mounts | grep cifs' which should show vers=1.0 in the options.
      turn_metrics:
        - custom:answer_correctness

- conversation_group_id: KBASE-066
  description: "KVM VM packet loss with vnet TX drops on hypervisor"
  tag: evals_kbase
  turns:
    - turn_id: turn1
      query: "I'm seeing packet loss into a KVM virtual machine with drops in the vnet TX counters on the hypervisor. How do I reduce the drops?"
      response: null
      contexts: null
      expected_response: |
        Packet drops in tun_net_xmit (visible with dropwatch) indicate the tuntap device transmit queue is overrun. Optimizations: (1) Use tuned with virtual-host profile on hypervisor, virtual-guest inside the guest. (2) Use virtio-net instead of emulated interfaces like e1000. (3) Enable virtio-net multiqueue to spread load across VCPU cores. (4) Increase the tuntap device transmit queue length. (5) Confine VM VCPU and memory to a single NUMA node on the hypervisor. (6) Avoid over-subscribing the hypervisor. This is most commonly seen with UDP traffic.
      turn_metrics:
        - custom:answer_correctness

- conversation_group_id: KBASE-067
  description: "Dracut temporary directory /var/tmp/dracut/initramfs safe to remove"
  tag: evals_kbase
  turns:
    - turn_id: turn1
      query: "Why does the /var/tmp/dracut/initramfs directory exist on my RHEL system and is it safe to remove?"
      response: null
      contexts: null
      expected_response: |
        The /var/tmp/dracut directory is a temporary working directory used by dracut during initramfs generation. The final initramfs is saved at /boot/initramfs-<kernel-version>.img. The initramfs is regenerated with each kernel update. If generation does not complete properly, residual files may be left behind. When generation completes successfully, the directory is automatically cleaned up. It is safe to remove /var/tmp/dracut if no dracut process is currently running.
      turn_metrics:
        - custom:answer_correctness

- conversation_group_id: KBASE-068
  description: "sosreport triggers kernel crash in __d_lookup on proc filesystem"
  tag: evals_kbase
  turns:
    - turn_id: turn1
      query: "Running sosreport causes a kernel crash with BUG: unable to handle kernel paging request in __d_lookup when looking up /proc/pid/fd. What is this?"
      response: null
      contexts: null
      expected_response: |
        This is a kernel bug affecting RHEL 8.9 (kernel-4.18.0-513.24.1.el8_9) observed on certain server hardware. When sosreport iterates through /proc/<pid>/fd/, the __d_lookup function encounters a corrupted dentry hash chain pointer, triggering a page fault and kernel panic in iterate_dir -> proc_fill_cache -> d_lookup -> __d_lookup. This is a race condition in the proc filesystem's directory entry lookup. Update the kernel to the latest available version that includes the fix for this dentry hash chain corruption.
      turn_metrics:
        - custom:answer_correctness

- conversation_group_id: KBASE-069
  description: "Connection refused despite working network - firewall blocking"
  tag: evals_kbase
  turns:
    - turn_id: turn1
      query: "Attempts to connect to a server fail with 'Connection refused' even though ping works fine. What should I investigate?"
      response: null
      contexts: null
      expected_response: |
        The destination system has a firewall rule rejecting or dropping the connection. Check: 'iptables -L' (legacy), 'nft list ruleset' (nftables), or 'firewall-cmd --list-all-zones' (firewalld). Look for rules blocking the port or source IP. A packet capture on the destination (tcpdump -nni <iface> port <port> or icmp) will show the SYN met with ICMP port unreachable or administratively prohibited. To remove blocking rules: iptables -D <chain> <rule>, nft delete rule <table> <chain> handle <number>, or firewall-cmd --permanent --remove-port=<port>.
      turn_metrics:
        - custom:answer_correctness

- conversation_group_id: KBASE-070
  description: "Customize LUKS encryption key size on RHEL 9"
  tag: evals_kbase
  turns:
