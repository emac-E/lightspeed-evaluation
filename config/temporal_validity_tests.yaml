- conversation_group_id: TEMPORAL-MIGRATION-001
  description: "Migrating DHCP server from RHEL 9 to RHEL 10"
  tag: temporal_validity
  temporal_test: true
  target_version: "RHEL 10"
  requires_versions: ["RHEL 9", "RHEL 10"]

  turns:
    - turn_id: turn1
      query: "How do I migrate my DHCP server from RHEL 9 to RHEL 10?"
      response: null
      contexts: null

      expected_response: |
        ISC DHCP (RHEL 9) to Kea (RHEL 10) migration steps:

        1. Backup RHEL 9 config:
           - /etc/dhcp/dhcpd.conf

        2. Convert configuration:
           - Kea uses JSON format, not ISC DHCP syntax
           - Subnet declarations become subnet4/subnet6 objects
           - Different option names and structure

        3. Install Kea on RHEL 10:
           - dnf install kea

        4. Configure /etc/kea/kea-dhcp4.conf

        5. Test before production migration

      required_terms:
        - "ISC DHCP"
        - "Kea"
        - "migration"
        - "configuration"
        - "RHEL 9"
        - "RHEL 10"

      turn_metrics:
        - ragas:faithfulness
        - ragas:response_relevancy
        - ragas:context_precision_without_reference
        - ragas:context_relevance
        - custom:answer_correctness

