# Temporal Validity Test Suite
# Tests version-specific documentation accuracy and temporal context handling
#
# Purpose: Verify that okp-mcp retrieves correct version docs and that
#          ragas metrics can detect when outdated/wrong-version contexts are used
#
# Categories:
#   - REMOVED: Features available in older RHEL but removed in newer
#   - ADDED: Features not in older RHEL but added in newer
#   - CHANGED: Syntax or defaults that changed between versions
#   - MIGRATION: Cross-version migration scenarios

# ==============================================================================
# SECTION 1: REMOVED FEATURES (Critical - Wrong version causes failures)
# ==============================================================================

- conversation_group_id: TEMPORAL-REMOVED-001
  description: "ISC DHCP removed in RHEL 10, replaced with Kea"
  tag: temporal_validity
  temporal_test: true
  target_version: "RHEL 10"
  wrong_versions: ["RHEL 9", "RHEL 8"]

  turns:
    - turn_id: turn1
      query: "How to install and configure a DHCP server in RHEL 10?"
      response: null
      contexts: null

      expected_response: |
        Kea is the DHCP server in RHEL 10. ISC DHCP was removed.
        Installation:
        - dnf install kea
        Configuration: /etc/kea/kea-dhcp4.conf or kea-dhcp6.conf
        Start service: systemctl enable --now kea-dhcp4

      forbidden_terms:
        - "dhcp-server"       # RHEL 9 package name
        - "dhcpd.conf"        # ISC DHCP config file
        - "systemctl start dhcpd"  # Old service name

      required_terms:
        - "Kea"
        - "RHEL 10"

      turn_metrics:
        - ragas:faithfulness
        - ragas:response_relevancy
        - ragas:context_precision_without_reference
        - ragas:context_relevance
        - custom:answer_correctness

- conversation_group_id: TEMPORAL-REMOVED-002
  description: "network-scripts deprecated in RHEL 9, removed in RHEL 10"
  tag: temporal_validity
  temporal_test: true
  target_version: "RHEL 10"

  turns:
    - turn_id: turn1
      query: "How to configure static IP address in RHEL 10?"
      response: null
      contexts: null

      expected_response: |
        Use NetworkManager in RHEL 10:
        - nmcli con add type ethernet con-name eth0 ifname eth0
        - nmcli con mod eth0 ipv4.addresses 192.168.1.100/24
        - nmcli con mod eth0 ipv4.method manual
        - nmcli con up eth0

        Alternative: NetworkManager keyfiles in /etc/NetworkManager/system-connections/

      forbidden_terms:
        - "/etc/sysconfig/network-scripts"
        - "ifcfg-eth0"
        - "BOOTPROTO=static"

      required_terms:
        - "NetworkManager"
        - "nmcli"

      turn_metrics:
        - ragas:faithfulness
        - ragas:response_relevancy
        - ragas:context_precision_without_reference
        - ragas:context_relevance
        - custom:answer_correctness

