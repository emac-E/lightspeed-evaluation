# ==============================================================================
# SECTION 5: POISONED CONTEXT TESTS (Controlled wrong versions)
# ==============================================================================

- conversation_group_id: TEMPORAL-POISON-001
  description: "Deliberately inject RHEL 9 docs for RHEL 10 DHCP query"
  tag: temporal_validity_poisoned
  temporal_test: true
  api:
    enabled: false  # Manual context provision

  turns:
    - turn_id: turn1
      query: "How to install DHCP server in RHEL 10?"

      # Manually provide WRONG version contexts (RHEL 9)
      contexts:
        - |
          Red Hat Enterprise Linux 9 Documentation
          Installing and Configuring DHCP Server

          To install DHCP server on RHEL 9:

          1. Install the dhcp-server package:
             # dnf install dhcp-server

          2. Configure /etc/dhcp/dhcpd.conf with your network settings

          3. Start and enable the DHCP service:
             # systemctl enable --now dhcpd

          4. Configure firewall:
             # firewall-cmd --add-service=dhcp --permanent

        - |
          RHEL 9 System Administration Guide
          Chapter: Network Services
          Section: DHCP Server

          The dhcp-server package provides the ISC DHCP server daemon.
          This is a widely-used DHCP implementation suitable for most
          enterprise environments.

      response: null  # Will be populated by LLM using wrong contexts

      expected_response: |
        Kea is the DHCP server in RHEL 10. ISC DHCP was removed.
        Install: dnf install kea

      turn_metrics:
        - ragas:context_relevance      # Should detect wrong version
        - ragas:faithfulness           # May be HIGH if LLM uses wrong contexts
        - custom:answer_correctness    # Should FAIL

      turn_metrics_metadata:
        "ragas:context_relevance":
          threshold: 0.3  # Lower because we EXPECT low relevance

        "custom:answer_correctness":
          threshold: 0.8  # Should fail

