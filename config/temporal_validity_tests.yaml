      expected_response: |
        DHCP Server differences:

        RHEL 9:
        - ISC DHCP (dhcp-server package)
        - Traditional /etc/dhcp/dhcpd.conf configuration
        - systemctl dhcpd service

        RHEL 10:
        - Kea DHCP (kea package)
        - JSON-based configuration (/etc/kea/kea-dhcp4.conf)
        - systemctl kea-dhcp4 service
        - ISC DHCP removed, migration required

