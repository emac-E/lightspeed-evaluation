- conversation_group_id: CLA-037
  description: "Printing - CUPS scheduler not running"
  tag: evals_printing
  turns:
    - turn_id: turn1
      query: "I have got an error for cups command, that Scheduler is not running. I'm admin."
      response: null
      contexts: null
      expected_response: |
        It sounds like the CUPS (Common Unix Printing System) service, which manages printing on your RHEL system, is not running.
        Here's how you can check its status and start it:
        1. **Check the status of the CUPS service:** ```bash systemctl status cups ``` This command will show you if the service is active, inactive, or failed.
        2. **If the service is not running (inactive or failed), start it:** ```bash systemctl start cups ```
        3. **Enable the service to start automatically on boot (recommended):** ```bash systemctl enable cups ```
        4. **Verify the status again:** ```bash systemctl status cups ``` It should now show as `active (running)`.
        Once the CUPS scheduler is running, your `cups` commands should function correctly. Red Hat Enterprise Linux provides a robust and stable environment for critical services like CUPS, ensuring reliable printing operations.
      turn_metrics:
        - ragas:faithfulness
        - ragas:response_relevancy
        - ragas:context_precision_without_reference
        - ragas:context_relevance
        - custom:answer_correctness

- conversation_group_id: CLA-038
  description: "Printing - add printer queue"
  tag: evals_printing
  turns:
    - turn_id: turn1
      query: "How to add printer queue?"
      response: null
      contexts: null
      expected_response: |
        You can use cups WebUI with default url localhost:631 or by lpadmin command. To add a printer queue in Red Hat Enterprise Linux (RHEL) using the `lpadmin` utility, follow these steps:

        1. **Ensure CUPS is configured**: Make sure that the CUPS printing system is properly configured on your RHEL system.

        2. **Identify the printer**: Determine the type of printer you are adding (network printer or locally attached printer) and gather the necessary information such as the printer's IP address, hostname, or USB device path.

        3. **Use the `lpadmin` command**: The `lpadmin` command is used to add, modify, or remove printers in CUPS. Here are the basic syntax and options:

          ```bash
          lpadmin -p <printer_name> -E -v <device_uri> -m <ppd_file>
          ```

          - `-p <printer_name>`: Specifies the name of the printer queue you want to create.
          - `-E`: Enables the printer queue.
          - `-v <device_uri>`: Specifies the device URI for the printer. The device URI depends on the type of printer and the connection method. For example:
            - For a network printer using IPP: `ipp://printer_hostname_or_ip:631/ipp/print`
            - For a network printer using socket: `socket://printer_hostname_or_ip:9100`
            - For a network printer using LPD: `lpd://printer_hostname_or_ip/queue`
            - For a locally attached printer (USB): `usb://<vendor_id>:<product_id>`
          - `-m <ppd_file>`: Specifies the PPD (PostScript Printer Description) file for the printer. If you are using driverless printing, you can omit this option.
