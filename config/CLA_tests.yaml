- conversation_group_id: CLA-067
  description: "RHEL - pin VM vCPU to NUMA cores"
  tag: evals_rhel_specific
  turns:
    - turn_id: turn1
      query: "What are the specific commands to identify the physical cores of NUMA node 0 and then dynamically pin a running VM's vCPU to those cores using `virsh`? Just give me the commands."
      response: null
      contexts: null
      expected_response: |
        To pin the vCPUs of a specific VM to the physical cores of NUMA node 0 in libvirt without shutting down the VM, you can use the `virsh vcpupin` command. Here's how:
        1. First, identify the vCPU numbers of the VM you want to configure. You can use the following command to list the VM's details:
          ```
          virsh dominfo <VM_NAME>
          ```
        2. Next, determine the physical CPU cores that correspond to NUMA node 0. This can be done by running:
          ```
          lscpu -p=node,cpu
          ```
          and looking for the cores associated with node 0.
        3. Once you have identified the vCPUs and the physical cores, use the `virsh vcpupin <domain> <vcpu> <cpulist>` command to set the vCPU affinity. When run on an active (running) VM, the changes apply to the live configuration by default.
          For example, if your VM has vCPUs 0, 1, and 2, and you want to pin them to physical cores 13, 14, and 15 of NUMA node 0, you can run:
          ```
          virsh vcpupin <VM_NAME> 0 13
          virsh vcpupin <VM_NAME> 1 14
          virsh vcpupin <VM_NAME> 2 15
          ```
          Replace `<VM_NAME>` with the actual name of your VM and `0`, `1`, `2` with the respective vCPU numbers, and `13`, `14`, `15` with the physical core numbers.
        4. Verify the vCPU placement with:
          ```
          virsh vcpuinfo <VM_NAME>
          ```
        This procedure allows you to pin vCPUs to specific physical cores without needing to shut down the VM.
      turn_metrics:
        - ragas:faithfulness
        - ragas:response_relevancy
