      query: "How can I temporarily disable SELinux?"
      response: null
      contexts: null
      expected_response: |
        To temporarily disable SELinux, follow these steps:
        1. Check the current SELinux status:
           Run the command `getenforce` to see if SELinux is enforcing, permissive, or disabled.
        2. Temporarily set SELinux to permissive mode:
           Use `setenforce 0` to switch SELinux to permissive mode. This disables enforcement but still logs policy violations. The change is temporary and will reset after a reboot.
        3. Verify the change:
           Run `getenforce` again to confirm it now shows "Permissive".
        Note: Permanent changes require editing the `/etc/selinux/config` file. For temporary changes, `setenforce` is sufficient.
