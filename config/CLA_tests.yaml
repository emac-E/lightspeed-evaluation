- conversation_group_id: CLA-086
  description: "SELinux - view and interpret AVC messages"
  tag: evals_sst_selinux
  turns:
    - turn_id: turn1
      query: "How to see today AVCs messages and how to interpret them to SELinux rules?"
      response: null
      contexts: null
      expected_response: |
        To view AVC (Access Vector Cache) messages on a Red Hat Enterprise Linux (RHEL) system, you can use the auditd service and the ausearch command. Here's how you can do it:
        1. Use the ausearch command to search for AVC messages in the audit logs:
           Run: ausearch -m avc -ts today
           This searches for AVC messages (-m avc) in the audit logs from today (-ts today). You can adjust the time range as needed.

        2. To see AVC messages in a more readable format, use the audit2allow command:
           Run: ausearch -m avc -ts today | audit2allow -w
           This provides a user-friendly explanation of the denials.

        3. Alternatively, use the sealert command to view AVC messages and get suggestions:
           Run: ausearch -m avc -ts today | sealert -l
           This gives detailed information about the denials and suggests possible solutions.

        By using these commands, you can view AVC messages and gain insights into SELinux policy violations or denials on your RHEL system.

        Note: Viewing AVC messages requires root or sudo privileges.
      turn_metrics:
        - ragas:faithfulness
        - ragas:response_relevancy
        - ragas:context_precision_without_reference
        - ragas:context_relevance
        - custom:answer_correctness

- conversation_group_id: CLA-087
  description: "SELinux - prepare custom policy from AVC messages"
  tag: evals_sst_selinux
  turns:
    - turn_id: turn1
      query: "How to prepare a custom SELinux policy based on AVC messages?"
      response: null
      contexts: null
      expected_response: |
        To prepare a custom SELinux policy based on AVC (Access Vector Cache) messages, follow these steps:
        1. Generate a custom policy module:
           - Use audit2allow to generate a policy module from the AVC messages.
           - Example command:
             sudo ausearch -m avc -ts today | audit2allow -M mypolicy
           - This creates a policy module named mypolicy.pp.
        2. Review the policy module:
           - Inspect the generated module to ensure it contains the necessary rules.
           - The module will be located at /etc/selinux/targeted/modules/active/modules/mypolicy.pp
        3. Load the custom policy module:
           - Use the semodule command to load the module into SELinux.
           - Example command:
             sudo semodule -i /etc/selinux/targeted/modules/active/modules/mypolicy.pp
        4. Verify the policy:
           - Monitor the audit logs to check if AVC denials are resolved.
           - Example command:
             sudo ausearch -m avc -ts recent
        5. Optional: Refine the policy:
           - If additional AVC denials occur, repeat the process to refine the module.
           - Analyze new AVC messages and update the policy accordingly.
        6. Document the changes:
           - Keep a record of custom policy changes for future reference and maintenance.
        By following these steps, you can create and implement a custom SELinux policy to address specific AVC denials and enhance the security of your RHEL system.
      turn_metrics:
        - ragas:faithfulness
        - ragas:response_relevancy
        - ragas:context_precision_without_reference
        - ragas:context_relevance
        - custom:answer_correctness

