  tag: temporal_validity

  turns:
    - turn_id: turn1
      query: "How to install and configure a DHCP server in RHEL 10?"
      response: null
      contexts: null

      expected_response: |
        Kea is the DHCP server in RHEL 10. ISC DHCP was removed.
        Installation: dnf install kea
        Configuration: /etc/kea/kea-dhcp4.conf or kea-dhcp6.conf
        Start service: systemctl enable --now kea-dhcp4

      turn_metrics:
        - ragas:faithfulness
        - ragas:response_relevancy
        - ragas:context_precision_without_reference
        - ragas:context_relevance
        - ragas:context_recall
        - custom:answer_correctness

