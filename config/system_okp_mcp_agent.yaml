# LightSpeed Evaluation Framework Configuration - OKP-MCP Agent Full Tests
#
# This configuration is optimized for OKP-MCP functional test evaluation with LLM responses.
# It includes ONLY the 6 metrics needed for functional tests:
# 1. url_retrieval_eval - URL retrieval quality (F1 score)
# 2. keywords_eval - Required keywords/facts present in response
# 3. context_precision_without_reference - Retrieval precision
# 4. context_relevance - RAG retrieval relevance
# 5. forbidden_claims_eval - Regression detection (avoiding known-wrong claims)
# 6. answer_correctness - Final answer quality (only when expected_response exists)

# Core evaluation parameters
core:
  max_threads: 50             # Maximum number of threads
  fail_on_invalid_data: true  # If False don't fail on invalid conversations
  skip_on_failure: false      # If True, skip remaining turns when a turn evaluation fails

# LLM as a judge configuration
llm:
  provider: "vertex"
  model: "gemini-2.5-pro"
  ssl_verify: true
  ssl_cert_file: null
  temperature: 0.0
  max_tokens: 32768
  timeout: 300
  num_retries: 3
  cache_dir: ".caches/llm_cache"
  cache_enabled: true

# Default embedding configuration
embedding:
  provider: "huggingface"
  model: "sentence-transformers/all-MiniLM-L6-v2"
  provider_kwargs: {}
  cache_dir: ".caches/embedding_cache"
  cache_enabled: true

# Lightspeed-stack API Configuration
api:
  enabled: true
  api_base: http://127.0.0.1:8443/api/lightspeed
  version: v1
  endpoint_type: infer
  timeout: 300

  # API input configuration
  provider: "vertex"
  model: "google/gemini-2.5-flash"
  no_tools: null
  system_prompt: null

  cache_dir: ".caches/api_cache"
  cache_enabled: true
  num_retries: 3

# Focused metrics for OKP-MCP functional tests
# All metrics have default: false to only run when specified in turn_metrics
metrics_metadata:
  turn_level:
    # === RETRIEVAL METRICS (for RAG quality) ===

    "ragas:context_relevance":
      threshold: 0.7
      description: "Is what we retrieved actually relevant to user query?"
      default: false  # Only run when explicitly specified in turn_metrics

    "ragas:context_precision_without_reference":
      threshold: 0.7
      description: "How precise the retrieved context is (without reference)"
      default: false  # Only run when explicitly specified in turn_metrics

    # === CUSTOM FUNCTIONAL TEST METRICS ===

    "custom:url_retrieval_eval":
      threshold: 0.7
      description: "URL retrieval quality - F1 score of expected vs retrieved documentation URLs"
      default: false  # Only run when explicitly specified in turn_metrics

    "custom:keywords_eval":
      description: "Keywords (ALL) matching evaluation with alternative sets"
      default: false  # Only run when explicitly specified in turn_metrics

    "custom:forbidden_claims_eval":
      threshold: 1.0
      description: "Known-incorrect claims avoided in response (regression detection)"
      default: false  # Only run when explicitly specified in turn_metrics

    "custom:answer_correctness":
      threshold: 0.75
      description: "Correctness vs expected answer using custom LLM evaluation"
      default: false  # Only run when explicitly specified in turn_metrics (when expected_response exists)

  # Conversation-level metrics (not used for functional tests)
  conversation_level: {}

# Output configuration
output:
  output_dir: "./eval_output"
  base_filename: "evaluation"
  enabled_outputs:
    - csv
    - json
    - txt

# Environment variables
env:
  DEEPEVAL_TELEMETRY_OPT_OUT: "YES"
  DEEPEVAL_DISABLE_PROGRESS_BAR: "YES"
  LITELLM_LOG: ERROR

# Logging Configuration
logging:
  # Source code logging level
  source_level: INFO          # DEBUG, INFO, WARNING, ERROR, CRITICAL

  # Package logging level (imported libraries)
  package_level: ERROR

  # Log format and display options
  log_format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  show_timestamps: true

  # Specific package log levels (override package_level for specific libraries)
  package_overrides:
    httpx: ERROR
    httpcore: ERROR
    google: ERROR
    PIL: ERROR
