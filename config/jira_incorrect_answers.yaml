- conversation_group_id: RSPEED-2200
  description: "Hugepages configuration - Previously omitted required parameter"
  tag: wrong_answers
  turns:
    - turn_id: turn1
      query: "How to configure 64 hugepages of size 1G at boot time in RHEL 10?"
      response: null
      contexts: null
      expected_response: |
        Must use grubby with ALL THREE kernel parameters. Key facts:
        - Correct command: grubby --update-kernel=ALL --args="default_hugepagesz=1G hugepagesz=1G hugepages=64"
        - default_hugepagesz=1G is REQUIRED (sets 1G as the default huge page size)
        - Then reboot and verify with: grep HugePages /proc/meminfo
        WRONG if it omits: default_hugepagesz=1G from the grubby command
      turn_metrics:
        - ragas:faithfulness
        - ragas:response_relevancy
        - ragas:context_precision_without_reference
        - ragas:context_relevance
        - ragas:context_recall
        - custom:answer_correctness

