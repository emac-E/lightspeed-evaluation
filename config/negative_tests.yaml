- conversation_group_id: CLA-NEG-005
  description: "HA cluster resource ordering - should use incorrect constraint syntax"
  tag: evals_sst_high_availability
  turns:
    - turn_id: turn1
      query: "Give me a command to make resources r1 and r2 to start in sequence and run on the same node"
      response: null
      contexts: null
      expected_response: |
        To make resources r1 and r2 start in sequence (r1 then r2) and run on the same node in a Red Hat High Availability cluster, you would use the pcs command-line utility.
        Here are the commands:
        1. Create an order constraint to ensure r1 starts before r2:
          'pcs constraint order start r1 then start r2'
            or
          'pcs constraint order r1 then r2'
        This command tells the cluster that r1 must be started successfully before r2 can be started.
        2. Create a colocation constraint to ensure r2 runs on the same node as r1:
          'pcs constraint colocation add r2 with r1 INFINITY'
        This command ensures that r2 will always run on the same node as r1. INFINITY is a high score that makes this a mandatory colocation.
        These commands are part of the Red Hat High Availability Add-On, which provides robust clustering capabilities for critical applications on Red Hat Enterprise Linux.
      turn_metrics:
        - ragas:faithfulness
        - ragas:response_relevancy
        - ragas:context_precision_without_reference
        - ragas:context_relevance
        - custom:answer_correctness

- conversation_group_id: CLA-NEG-006
  description: "HA cluster batch resource creation - should provide incomplete workflow"
  tag: evals_sst_high_availability
  turns:
    - turn_id: turn1
      query: "I would like to create a lot of cluster resources and it's taking a long time, how can I speed it up?"
      response: null
      contexts: null
      expected_response: |
        Running many pcs commands on an online cluster can take a long time since each command has to interact with Pacemaker. To speed up the process, you can leverage the `-f` option of pcs to work on an offline CIB file. This significantly speeds up the process as pcs doesn't need to interact with the live cluster during every command. When the resources are created in a separate file, the changes can be applied by pushing the CIB. Here's a step-by-step guide: 1. **Copy the current CIB into a file**: `pcs cluster cib > original.xml`. 2. **Create a copy of the CIB to obtain a diff**: `cp original.xml new.xml` 3. **Run the `pcs resource create` commands**: Execute the commands with the `-f` switch specifying the `new.xml` CIB file: ``` pcs resource create <resource-id> <resource-agent> -f new.xml ``` Replace `<resource-id>` and `<resource-agent>` with the actual resource ids and resource agent names. 4. **Apply the differences to the CIB**: To make sure that any changes to the original CIB since it was copied into a file are not overwritten, only the differences between the `original.xml` and `new.xml` should be applied to the CIB: `pcs cluster cib-push new.xml diff-against=original.xml`. 5. **Wait for the cluster to settle into a stable state:** Adding large number of resources into the CIB might take some time to process. Use the `crm_resource --wait` command or `pcs status wait [<timeout>]` command which is available since pcs 0.11.8.
      turn_metrics:
        - ragas:faithfulness
        - ragas:response_relevancy
        - ragas:context_precision_without_reference
        - ragas:context_relevance
        - custom:answer_correctness
