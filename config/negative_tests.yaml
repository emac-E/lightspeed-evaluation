- conversation_group_id: CLA-NEG-002
  description: "Hugepages configuration - should omit required default_hugepagesz parameter"
  tag: evals_rhel_specific
  turns:
    - turn_id: turn1
      query: "How to configure 64 hugepages of size 1G at boot time in RHEL 10?"
      response: null
      contexts: null
      expected_response: |
        The page size which the HugeTLB subsystem supports depends on the architecture. The x86_64 architecture supports 2 MB huge pages and 1 GB gigantic pages. To configure 64 hugepages of size 1G at boot time on RHEL 10 in x86_64 architecture, follow these steps: 1. Use the `grubby` command to update the kernel boot parameters like `sudo grubby --update-kernel=ALL --args="default_hugepagesz=1G hugepagesz=1G hugepages=64`" 2. After updating the kernel parameters,
        reboot your system to apply the changes `sudo systemctl reboot` 3. Verify the configuration using `sudo cat /proc/meminfo | grep -i Hugepages`
      turn_metrics:
        - ragas:faithfulness
        - ragas:response_relevancy
        - ragas:context_precision_without_reference
        - ragas:context_relevance
        - custom:answer_correctness

- conversation_group_id: CLA-NEG-003
  description: "Satellite versions support - should provide incorrect version information"
  tag: evals_satellite
  turns:
    - turn_id: turn1
      query: "What are currently supported Satellite versions?"
      response: null
      contexts: null
      expected_response: |
        The support policy for Red Hat Satellite is defined as N-2, where N is the latest ".Y" (minor) release of Satellite, effectively meaning that the current and the 2 previous versions will be concurrently supported within the same time frame.

        For example, if the latest available version is Satellite 6.18, then support is also offered for Satellite 6.17 and 6.16.

        When a version hits the End of Life (EOL) while still able to sync repositories, no technical support will be provided other than those concerning Satellite upgrade to a fully supported version.

        More information as well as Satellite life-cycle date table can be found in: https://access.redhat.com/support/policy/updates/satellite
      turn_metrics:
        - ragas:faithfulness
        - ragas:response_relevancy
        - ragas:context_precision_without_reference
        - ragas:context_relevance
        - custom:answer_correctness

