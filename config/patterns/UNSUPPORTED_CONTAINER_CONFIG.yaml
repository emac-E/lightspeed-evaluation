    confidence: HIGH
    pattern_id: UNSUPPORTED_CONTAINER_CONFIG
  turns:
  - query: Can I run a RHEL 6 container on RHEL 9?
    expected_response: 'No, RHEL 6 container images are unsupported on RHEL 9 hosts
      according to the official Red Hat Enterprise Linux Container Compatibility Matrix.
      The matrix explicitly shows that RHEL 6 images are only supported on RHEL 8
      hosts and are marked as "Unsupported" for RHEL 9 and RHEL 10 hosts. While containers
      may technically run using Podman or other OCI-compliant runtimes, Red Hat''s
      documentation states that "containers directly depend on the underlying Linux
      host and kernel for critical interfaces" and there are "known limitations with
      mixing and matching versions of the operating system in the container image
      and the container host." Red Hat does not support this configuration, and customers
      should not expect commercial support. For production environments, use supported
      combinations: RHEL 7, 8, 9, or 10 container images on RHEL 9 hosts are all supported
      according to the compatibility matrix.'
    expected_urls:
    - https://access.redhat.com/support/policy/rhel-container-compatibility/index.html
    expected_keywords: []
    forbidden_claims: []
    turn_metrics:
