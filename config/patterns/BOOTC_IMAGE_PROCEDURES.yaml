- conversation_group_id: RSPEED-1718
  metadata:
    jira_ticket: RSPEED-1718
    jira_url: https://redhat.atlassian.net/browse/RSPEED-1718
    confidence: MEDIUM
    pattern_id: BOOTC_IMAGE_PROCEDURES
  turns:
  - query: How do I create a disk image from a bootable container image in RHEL Image
      Mode?
    expected_response: Image mode for RHEL uses bootable containers (bootc) as a deployment
      method for RHEL systems. According to Red Hat documentation, 'Image mode for
      RHEL is a deployment method that uses a container-native approach to build,
      deploy, and manage the operating system as a rhel-bootc image. This container
      image uses standard OCI or Docker containers as a transport and delivery format
      for base operating system updates. A bootc image includes a Linux kernel that
      is used to start the operating system.' The process involves building a bootc
      image and then creating a virtual machine from it, as documented in the official
      Red Hat build of MicroShift guides (versions 4.17-4.21). The bootc-image-builder
      tool from registry.redhat.io/rhel9/bootc-image-builder is the recommended approach
      for converting bootable container images to disk images with support for multiple
      output formats (qcow2, raw, vmdk, ami, gce). Traditional tools like Image Builder
      (osbuild-composer) or lorax are not compatible with bootc-based container images.
    expected_urls:
    - https://access.redhat.com/documentation/en-us/red_hat_build_of_microshift/4.17/html-single/installing_with_image_mode_for_rhel/index/index.html
    - https://access.redhat.com/documentation/en-us/red_hat_build_of_microshift/4.19/html-single/installing_with_image_mode_for_rhel/index/index.html
    - https://access.redhat.com/documentation/en-us/red_hat_build_of_microshift/4.20/html-single/installing_with_image_mode_for_rhel/index/index.html
    - https://access.redhat.com/documentation/en-us/red_hat_build_of_microshift/4.21/html-single/installing_with_image_mode_for_rhel/index/index.html
