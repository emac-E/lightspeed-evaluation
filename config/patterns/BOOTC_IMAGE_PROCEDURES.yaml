- conversation_group_id: RSPEED-1650
  metadata:
    jira_ticket: RSPEED-1650
    jira_url: https://redhat.atlassian.net/browse/RSPEED-1650
    confidence: MEDIUM
    pattern_id: BOOTC_IMAGE_PROCEDURES
  turns:
  - query: Can you provide an example Containerfile for RHEL Image Mode with proper
      shell command syntax (without HTML entity encoding)?
    expected_response: 'RHEL Image Mode uses bootc images (rhel-bootc) that are customized
      via Containerfiles. Based on official RHEL documentation covering ''Composing,
      installing, and managing RHEL for Edge images'' (RHEL 9.6+, RHEL 10) and MicroShift
      bootc image building, a proper Containerfile uses standard shell syntax:


      FROM registry.redhat.io/rhel9/rhel-bootc:latest

      RUN dnf -y install httpd && dnf clean all

      RUN systemctl enable httpd

      CMD ["/sbin/init"]


      The issue described in RSPEED-1650 is that the RAG content extraction process
      incorrectly converts shell operators to HTML entities: ''&&'' becomes ''&amp;&amp;'',
      ''<'' becomes ''&lt;'', and ''>'' becomes ''&gt;''. This makes the code examples
      non-functional when copied. The original RHEL documentation contains correct
      shell syntax; the HTML entity encoding problem occurs during the content extraction/processing
      phase for the RAG system, not in the source documentation itself.'
    expected_urls:
    - https://access.redhat.com/documentation/en-us/red_hat_enterprise_linux/10/html-single/composing_installing_and_managing_rhel_for_edge_images/index/index.html
    - https://access.redhat.com/documentation/en-us/red_hat_build_of_microshift/4.19/html-single/installing_with_image_mode_for_rhel/index/index.html
    - https://access.redhat.com/documentation/en-us/red_hat_build_of_microshift/4.20/html-single/installing_with_image_mode_for_rhel/index/index.html
    - https://access.redhat.com/documentation/en-us/red_hat_build_of_microshift/4.21/html-single/installing_with_image_mode_for_rhel/index/index.html
