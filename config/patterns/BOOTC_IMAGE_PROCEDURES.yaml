- conversation_group_id: RSPEED-1719
  metadata:
    jira_ticket: RSPEED-1719
    jira_url: https://redhat.atlassian.net/browse/RSPEED-1719
    confidence: HIGH
    pattern_id: BOOTC_IMAGE_PROCEDURES
  turns:
  - query: How do I create a VMware VMDK disk image from a RHEL Image Mode bootable
      container?
    expected_response: "To create a VMware VMDK disk image from a RHEL Image Mode\
      \ bootable container, use the official bootc-image-builder container image available\
      \ in RHEL 9. According to Red Hat errata RHEA-2025:4415, the rhel9/bootc-image-builder\
      \ is a Technology Preview tool that \"converts bootable container images, for\
      \ example rhel-bootc, to different disk image formats, such as qcow2, ami, vmdk,\
      \ ISO, and other.\"\n\nThe process involves:\n\n1. Pull the bootc-image-builder\
      \ container:\n   podman pull registry.redhat.io/rhel9/bootc-image-builder\n\n\
      2. Run the builder with the --type vmdk parameter to specify VMDK output format:\n\
      \   sudo podman run --rm -it --privileged --pull=newer \\\n     --security-opt\
      \ label=type:unconfined_t \\\n     -v /var/lib/containers/storage:/var/lib/containers/storage\
      \ \\\n     -v ./output:/output \\\n     registry.redhat.io/rhel9/bootc-image-builder:latest\
      \ \\\n     --type vmdk \\\n     <your-bootable-container-image>\n\n3. The resulting\
      \ VMDK file will be in the ./output directory and can be imported into VMware\
      \ vSphere, ESXi, or other VMware platforms.\n\nNote: bootc-image-builder requires\
      \ privileged access and unconfined SELinux context. This is the official and\
      \ supported method for creating disk images from RHEL Image Mode bootable containers.\
      \ Traditional RHEL image builder tools (composer-cli, osbuild-composer) are\
      \ NOT compatible with Image Mode bootable containers.\n\nFor complete documentation,\
      \ refer to: https://access.redhat.com/documentation/en-us/red_hat_enterprise_linux/9/html/using_image_mode_for_rhel_to_build_deploy_and_manage_operating_systems"
    expected_urls:
    - https://access.redhat.com/errata/RHEA-2025:4415/index.html
    - https://access.redhat.com/documentation/en-us/red_hat_enterprise_linux/9/html/using_image_mode_for_rhel_to_build_deploy_and_manage_operating_systems
    expected_keywords: []
    forbidden_claims: []
