- conversation_group_id: RSPEED-1774
  metadata:
    jira_ticket: RSPEED-1774
    jira_url: https://redhat.atlassian.net/browse/RSPEED-1774
    confidence: HIGH
    pattern_id: CENTOS_RHEL_CONVERSION
  turns:
  - query: What yum repository is the convert2rhel utility available in?
    expected_response: 'The convert2rhel utility is available in publicly accessible
      repositories hosted on cdn.redhat.com, NOT in standard RHEL repositories like
      BaseOS or AppStream. The repository configuration is version-specific:


      For RHEL 7:

      - Repository ID: convert2rhel-for-rhel-7-rpms

      - Base URL: https://cdn.redhat.com/content/public/convert2rhel/7/x86_64/os/


      For RHEL 8:

      - Repository ID: convert2rhel-for-rhel-8-rpms

      - Base URL: https://cdn.redhat.com/content/public/convert2rhel/8/x86_64/os/


      Users must configure this repository by downloading the appropriate .repo file:

      ```

      curl -o /etc/yum.repos.d/convert2rhel.repo https://ftp.redhat.com/redhat/convert2rhel/VERSION/convert2rhel.repo

      ```


      This design is intentional because convert2rhel is used to convert non-RHEL
      systems (CentOS, Oracle Linux, Rocky Linux, etc.) to RHEL, so it must be publicly
      accessible without requiring an active RHEL subscription.'
    expected_urls:
    - https://access.redhat.com/solutions/6290431/index.html
    expected_keywords: []
    forbidden_claims: []
    turn_metrics:
    - ragas:context_relevance
    - ragas:context_precision_without_reference
    - custom:answer_correctness
- conversation_group_id: RSPEED-1773
  metadata:
    jira_ticket: RSPEED-1773
    jira_url: https://redhat.atlassian.net/browse/RSPEED-1773
    confidence: HIGH
    pattern_id: CENTOS_RHEL_CONVERSION
  turns:
  - query: What is the name of the command line utility Red Hat customers can use
      to convert their other Linux distributions to RHEL?
    expected_response: The command-line utility is called Convert2RHEL. It is Red
      Hat's officially supported tool for converting from Alma Linux, CentOS Linux,
      Oracle Linux, or Rocky Linux to Red Hat Enterprise Linux 7, 8, and 9. According
      to the official documentation, Convert2RHEL performs in-place conversions and
      can be used either directly via the command-line or through Red Hat Lightspeed
      for orchestrated conversions. The utility is documented in official Red Hat
      product documentation for both RHEL 8 and Red Hat Lightspeed.
    expected_urls:
    - https://access.redhat.com/documentation/en-us/red_hat_enterprise_linux/8/html-single/converting_from_a_linux_distribution_to_rhel_using_the_convert2rhel_utility/index/index.html
    - https://access.redhat.com/documentation/en-us/red_hat_lightspeed/1-latest/html-single/converting_from_a_linux_distribution_to_rhel_using_the_convert2rhel_utility_in_red_hat_lightspeed/index/index.html
    expected_keywords: []
