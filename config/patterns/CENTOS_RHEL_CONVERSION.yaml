- conversation_group_id: RSPEED-1775
  metadata:
    jira_ticket: RSPEED-1775
    jira_url: https://redhat.atlassian.net/browse/RSPEED-1775
    confidence: HIGH
    pattern_id: CENTOS_RHEL_CONVERSION
  turns:
  - query: What Linux distributions and versions can I convert to RHEL using Red Hat
      Insights web console?
    expected_response: Red Hat Insights supports converting CentOS Linux to RHEL through
      its web-based interface in the Red Hat Hybrid Cloud Console. The documentation
      explicitly confirms that 'the pre-conversion analysis task can be run on CentOS
      Linux 7 systems that are connected to Insights.' This Insights-based conversion
      'extends the Convert2RHEL tool's experience to the web-based Red Hat Hybrid
      Cloud Console to help convert many systems at scale from a web browser.' While
      the broader Convert2RHEL utility supports multiple distributions via command-line
      (CentOS Linux 7/8, Oracle Linux 7/8/9, AlmaLinux 8/9, Rocky 8/9), the documentation
      specifically identifies CentOS Linux 7 as the supported distribution for Insights
      web console conversion. Other supported conversion paths require using Convert2RHEL
      via command-line or Red Hat Satellite.
    expected_urls:
    - https://access.redhat.com/articles/how-to-convert-to-rhel-from-centos/index.html
    - https://access.redhat.com/articles/5941531/index.html
    - https://access.redhat.com/articles/migrate_centos_to_rhel_on_amazon/index.html
    expected_keywords: []
    forbidden_claims: []
    turn_metrics:
