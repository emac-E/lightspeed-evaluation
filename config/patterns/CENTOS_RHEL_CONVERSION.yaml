- conversation_group_id: RSPEED-1772
  metadata:
    jira_ticket: RSPEED-1772
    jira_url: https://redhat.atlassian.net/browse/RSPEED-1772
    confidence: HIGH
    pattern_id: CENTOS_RHEL_CONVERSION
  turns:
  - query: What are the currently supported conversion paths when converting from
      other Linux distributions to RHEL using Convert2RHEL?
    expected_response: 'Red Hat officially supports the following Convert2RHEL conversion
      paths (per the authoritative list in the Convert2RHEL documentation, updated
      June 2025):


      **RHEL 7 conversions:**

      - CentOS Linux 7 → RHEL 7 (x86_64)

      - Oracle Linux 7 → RHEL 7 (x86_64)


      **RHEL 8 conversions:**

      - CentOS Linux 8 → RHEL 8 (x86_64)

      - Oracle Linux 8 → RHEL 8 (x86_64)

      - AlmaLinux OS 8 → RHEL 8 (x86_64)

      - Rocky Linux 8 → RHEL 8 (x86_64)


      **RHEL 9 conversions:**

      - Oracle Linux 9 → RHEL 9 (x86_64)

      - AlmaLinux OS 9 → RHEL 9 (x86_64)

      - Rocky Linux 9 → RHEL 9 (x86_64)


      All supported conversions use 64-bit Intel (x86_64) architecture. The current
      answer is incomplete and outdated - it is missing AlmaLinux and Rocky Linux
      support entirely, and missing all RHEL 9 conversion paths. These are major version
      conversions; specific minor version requirements and restrictions are detailed
      in the full documentation.'
    expected_urls:
    - https://access.redhat.com/articles/5941531/index.html
    - https://access.redhat.com/documentation/en-us/red_hat_enterprise_linux/8/html-single/converting_from_a_linux_distribution_to_rhel_using_the_convert2rhel_utility/index/index.html
    - https://access.redhat.com/solutions/7018377/index.html
    expected_keywords: []
