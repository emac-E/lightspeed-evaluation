    confidence: HIGH
    pattern_id: RPM_OSTREE_EDGE_PROCEDURES
  turns:
  - query: How do I rollback my system to a previous version using rpm-ostree?
    expected_response: To rollback your system to a previous version using rpm-ostree,
      use the 'rpm-ostree rollback' command followed by a system reboot. According
      to RHEL for Edge documentation, you can use 'rpm-ostree rollback' to rollback
      to the previous RHEL for Edge image, and 'rpm-ostree status' to show which image
      will be booted by default. The rollback command switches the default deployment
      to the previous one in the bootloader. After running 'rpm-ostree rollback',
      reboot the system with 'systemctl reboot' to boot into the previous deployment.
      To view available deployments, use 'rpm-ostree status', which shows the deployment
      history and which one is currently booted. Note that commands like 'rpm-ostree
      split --list' and 'rpm-ostree transaction rollback <commit-id>' do not exist
      and are incorrect.
    expected_urls:
    - https://access.redhat.com/articles/5719641/index.html
    - https://access.redhat.com/errata/RHEA-2015:1171/index.html
