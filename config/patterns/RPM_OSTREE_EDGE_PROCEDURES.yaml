  turns:
  - query: How do I manage kernel arguments on rpm-ostree-based RHEL systems (RHEL
      for Edge, RHEL CoreOS, RHEL Atomic Host)?
    expected_response: 'On rpm-ostree-based systems (RHEL for Edge, RHEL CoreOS, RHEL
      Atomic Host), you must use ''rpm-ostree kargs'' to manage kernel arguments.
      The command syntax is:


      - Add arguments: ''rpm-ostree kargs --append=KEY=VALUE'' (use --append-if-missing=KEY=VALUE
      to only add if not present)

      - Replace arguments: ''rpm-ostree kargs --replace=KEY=VALUE=NEWVALUE''

      - Remove arguments: ''rpm-ostree kargs --delete=KEY=VALUE'' (use --delete-if-present=KEY=VALUE
      to avoid errors if missing)

      - View current arguments: ''rpm-ostree kargs'' (without options)

      - Edit interactively: ''rpm-ostree kargs --editor''


      After making changes, the output will show ''Changes queued for next boot. Run
      "systemctl reboot" to start a reboot''. A reboot is required to apply kernel
      argument changes. The rpm-ostree changes will be preserved after cluster/system
      updates.


      Important notes:

      - For arguments with special characters like quotes, use escape characters (e.g.,
      ''rpm-ostree kargs --append-if-missing=cgroup_no_v1=\"all\"'')

      - The --delete operation will fail if the specified kernel argument doesn''t
      exist (unless using --delete-if-present)

      - On OpenShift, MachineConfig is the standard way to manage kernel arguments,
      but rpm-ostree kargs is used for operations not supported by MachineConfig Operator
      (like removing certain arguments)

      - Do not use grubby on rpm-ostree systems, as it is designed for traditional
      RPM-based RHEL systems'
    expected_urls:
    - https://access.redhat.com/solutions/7069583
