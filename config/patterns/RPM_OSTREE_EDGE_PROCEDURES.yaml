- conversation_group_id: RSPEED-1930
  metadata:
    jira_ticket: RSPEED-1930
    jira_url: https://redhat.atlassian.net/browse/RSPEED-1930
    confidence: HIGH
    pattern_id: RPM_OSTREE_EDGE_PROCEDURES
  turns:
  - query: How do I install a package on a system using rpm-ostree?
    expected_response: 'To install a package on an rpm-ostree-based system (such as
      RHEL Atomic Host, RHEL Image Mode, or Red Hat CoreOS), use the command ''rpm-ostree
      install <package_name>''. This adds the package to a new deployment layer on
      top of the base image. After installation completes, you must reboot the system
      to activate the new deployment and use the installed package - the package is
      not immediately available until after reboot.


      Important considerations:

      1. Red Hat strongly recommends using containers or system containers to extend
      functionality rather than adding packages to the rpm-ostree branch whenever
      possible.

      2. Package path restrictions apply: rpm-ostree install will not allow packages
      that place binaries in /opt. Packages must use allowed paths: /usr, /bin, /sbin,
      /lib, /lib64 (or alternatives like /usr/opt or /usr/local/opt).

      3. The reboot requirement is mandatory - unlike traditional dnf/yum installations,
      packages installed via rpm-ostree are not available in the current session.


      Example: ''rpm-ostree install oddjob oddjob-mkhomedir'' followed by ''systemctl
      reboot'''
    expected_urls:
    - https://access.redhat.com/solutions/3297891
    - https://access.redhat.com/solutions/3154491
    - https://access.redhat.com/solutions/2946401
