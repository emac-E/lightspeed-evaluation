  turns:
  - query: What is the correct rpm-ostree command to view the list of deployments
      on a RHEL system?
    expected_response: "The correct command is `rpm-ostree status`. This command displays\
      \ all available rpm-ostree deployments on OSTree-based RHEL systems (such as\
      \ RHEL for Edge, RHEL Atomic Host, or RHEL CoreOS). According to Red Hat documentation,\
      \ `rpm-ostree status` is explicitly used to 'display rpm-ostree deployments'\
      \ and 'show which image will be booted by default'.\n\nThe command output includes:\n\
      - Currently booted deployment (marked with *)\n- Available rollback deployments\n\
      - Timestamp, version, and commit ID for each deployment\n- OSTree refspec information\n\
      - Package layering details (when using -v verbose flag)\n\nExample output:\n\
      ```\nState: idle\nDeployments:\n* ostree://rhel-atomic-host-ostree:rhel-atomic-host/7/x86_64/standard\n\
      \    Version: 7.8.3 (2020-08-05 13:51:05)\n    Commit: dfd383553c0f25c503272b0d193ac863f2deede0fa69278391bd2b1e6d02b56a\n\
      ```\n\nThe suggested `rpm-ostree branch` command is NOT a valid rpm-ostree command\
      \ for viewing deployments. This may be confusion with lower-level `ostree` CLI\
      \ commands that work with repository refs, not system deployments."
    expected_urls:
    - https://access.redhat.com/articles/5719641/index.html
